<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PortfolioTH</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070c14;--surface:#0d1525;--card:#111b2e;--border:#1e2d4a;--text:#e2e8f4;--muted:#5a7a9a;--accent:#3b82f6;--accent2:#60a5fa;--pos:#4ade80;--neg:#f87171;--warn:#fbbf24;--mono:'IBM Plex Mono',monospace}
[data-theme=light]{--bg:#f0f4f8;--surface:#fff;--card:#fff;--border:#d1dbe8;--text:#1a2332;--muted:#6b7f96;--accent:#2563eb;--accent2:#3b82f6}
html,body,#root{min-height:100%;background:var(--bg);color:var(--text)}
body{font-family:'Noto Sans Thai',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

// ── Icons ──────────────────────────────────────────────────────────────────────
const Ic = ({d,size=18,cls=""}) => (

const I = {

  x:"M18 6L6 18M6 6l12 12",

  sun:"M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 5a7 7 0 1 0 0 14A7 7 0 0 0 12 5z",
  moon:"M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z",
  target:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12zM12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z",
  calc:"M4 2h16a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zM8 6h2M14 6h2M8 10h2M14 10h2M8 14h2M14 14h2M8 18h8",
  sheets:"M4 15l4-8 4 8M12 7l4 8M2 19h20",
  zap:"M13 2L3 14h9l-1 8 10-12h-9l1-8z",
  csv:"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3",
  activity:"M22 12h-4l-3 9L9 3l-3 9H2",
  globe:"M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z",
  dollar:"M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6",
};

// ── Helpers ────────────────────────────────────────────────────────────────────
const f2 = (n,d=2) => n==null||isNaN(n) ? "—" : Number(n).toLocaleString("th-TH",{minimumFractionDigits:d,maximumFractionDigits:d});
const fUSD = (n) => n==null||isNaN(n) ? "—" : (n<0?"-$":"$")+Math.abs(Number(n)).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
const fPct = (n) => n==null||isNaN(n) ? "—" : (n>=0?"+":"")+Number(n).toFixed(2)+"%";
const clr = (n) => n>0?"pos":n<0?"neg":"muted";
const ago = (iso) => { if(!iso) return "ไม่เคย"; const s=(Date.now()-new Date(iso))/1000; if(s<60) return Math.floor(s)+"s ago"; if(s<3600) return Math.floor(s/60)+"m ago"; if(s<86400) return Math.floor(s/3600)+"h ago"; return new Date(iso).toLocaleDateString("th-TH"); };
const calcPnl = (a) => { const cost=a.qty*a.avgCost,value=a.qty*a.currentPrice,pnlAmt=value-cost; return {cost,value,pnlAmt,pnlPct:cost>0?(pnlAmt/cost)*100:0}; };

// ── Constants ──────────────────────────────────────────────────────────────────
const TYPES = ["หุ้น","คริปโต","ETF","กองทุน","อื่นๆ"];
const CCYS  = ["USD","THB","BTC","ETH"];
const SAMPLE = [
  {id:1,name:"Apple Inc.",ticker:"AAPL",type:"หุ้น",qty:10,avgCost:170.5,currentPrice:189.3,currency:"USD",sector:"Technology",note:"Long term hold",dateAdded:"2024-01-15"},
  {id:2,name:"Bitcoin",ticker:"BTC",type:"คริปโต",qty:0.5,avgCost:42000,currentPrice:67500,currency:"USD",sector:"Crypto",note:"DCA strategy",dateAdded:"2024-02-01"},
  {id:3,name:"NVIDIA Corp.",ticker:"NVDA",type:"หุ้น",qty:5,avgCost:495,currentPrice:875.4,currency:"USD",sector:"Technology",note:"AI play",dateAdded:"2024-01-20"},
  {id:4,name:"Ethereum",ticker:"ETH",type:"คริปโต",qty:3,avgCost:2100,currentPrice:3450,currency:"USD",sector:"Crypto",note:"",dateAdded:"2024-03-10"},
  {id:5,name:"PTT Global Chemical",ticker:"PTTGC",type:"หุ้น",qty:500,avgCost:38,currentPrice:32.5,currency:"THB",sector:"Energy",note:"Dividend stock",dateAdded:"2024-02-20"},
];

// ── Price APIs ─────────────────────────────────────────────────────────────────
const CG_IDS = {BTC:"bitcoin",ETH:"ethereum",BNB:"binancecoin",SOL:"solana",ADA:"cardano",XRP:"ripple",DOT:"polkadot",DOGE:"dogecoin",AVAX:"avalanche-2",MATIC:"matic-network",LINK:"chainlink",UNI:"uniswap",LTC:"litecoin"};

const fetchPrices = async (assets) => {
  const results = {};
  const cryptos = assets.filter(a=>a.type==="คริปโต");
  const stocks  = assets.filter(a=>a.type!=="คริปโต");
  if(cryptos.length){
    try{
      const ids = cryptos.map(a=>CG_IDS[a.ticker.toUpperCase()]||a.ticker.toLowerCase()).join(",");
      const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids="+ids+"&vs_currencies=usd");
      const d = await r.json();
      cryptos.forEach(a=>{ const id=CG_IDS[a.ticker.toUpperCase()]||a.ticker.toLowerCase(); if(d[id]&&d[id].usd) results[a.ticker.toUpperCase()]=d[id].usd; });
    }catch(e){console.warn("CoinGecko:",e.message);}
  }
  await Promise.allSettled(stocks.map(async a=>{
    try{
      const t = a.currency==="THB"&&!a.ticker.includes(".")?a.ticker+".BK":a.ticker;
      const url = "https://api.allorigins.win/get?url="+encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+t+"?interval=1d&range=1d");
      const r = await fetch(url);
      const w = await r.json();
      const d = JSON.parse(w.contents);
      const p = d&&d.chart&&d.chart.result&&d.chart.result[0]&&d.chart.result[0].meta&&d.chart.result[0].meta.regularMarketPrice;
      if(p) results[a.ticker.toUpperCase()]=p;
    }catch(e){console.warn("Yahoo "+a.ticker+":",e.message);}
  }));
  return results;
};

// ── Donut Chart ────────────────────────────────────────────────────────────────
const DonutChart = ({data}) => {
  const total = data.reduce((s,d)=>s+d.value,0);
  let off=0; const R=60,C=2*Math.PI*R;
  const COLS=["#60a5fa","#f59e0b","#34d399","#f472b6","#a78bfa","#fb923c"];
  const slices = data.map((d,i)=>{ const p=d.value/total; const s={...d,dash:p*C,gap:C-p*C,off:off*C,col:COLS[i%COLS.length]}; off+=p; return s; });
  return (
    <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
      <svg viewBox="0 0 160 160" width="140" height="140">
        <circle cx="80" cy="80" r={R} fill="none" stroke="#1e2d4a" strokeWidth="22"/>
        {slices.map((s,i)=><circle key={i} cx="80" cy="80" r={R} fill="none" stroke={s.col} strokeWidth="20" strokeDasharray={s.dash+" "+s.gap} strokeDashoffset={C/4-s.off}/>)}
        <text x="80" y="85" textAnchor="middle" fill="var(--text)" fontSize="10" fontWeight="700">Allocation</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {slices.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:7,fontSize:12}}>
          <span style={{width:9,height:9,borderRadius:"50%",background:s.col,flexShrink:0,display:"inline-block"}}/>
          <span style={{flex:1,color:"var(--text)"}}>{s.label}</span>
          <span style={{fontFamily:"var(--mono)",color:"var(--muted)",fontSize:11}}>{((s.value/total)*100).toFixed(1)}%</span>
        </div>)}
      </div>
    </div>
  );
};

// ── Bar Chart ──────────────────────────────────────────────────────────────────
const BarChart = ({assets}) => {
  const data = assets.map(a=>({...a,...calcPnl(a)})).sort((a,b)=>b.pnlPct-a.pnlPct);
  const mx = Math.max(...data.map(d=>Math.abs(d.pnlPct)),1);
  return <div style={{display:"flex",flexDirection:"column",gap:9}}>{data.map(d=>(
    <div key={d.id} style={{display:"grid",gridTemplateColumns:"52px 1fr 64px",alignItems:"center",gap:8}}>
      <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)",textAlign:"right"}}>{d.ticker}</span>
      <div style={{height:7,background:"var(--border)",borderRadius:4,overflow:"hidden"}}>
        <div style={{width:(Math.abs(d.pnlPct)/mx*100)+"%",height:"100%",background:d.pnlPct>=0?"var(--pos)":"var(--neg)",borderRadius:4}}/>
      </div>
      <span style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,textAlign:"right",color:d.pnlPct>=0?"var(--pos)":"var(--neg)"}}>{fPct(d.pnlPct)}</span>
    </div>
  ))}</div>;
};

// ── Growth Chart ───────────────────────────────────────────────────────────────
const PERIODS=[{l:"1M",m:1},{l:"3M",m:3},{l:"6M",m:6},{l:"YTD",ytd:true},{l:"1Y",m:12},{l:"2Y",m:24},{l:"ALL",all:true}];
const BENCHMARKS=[{id:"sp500",label:"S&P 500",col:"#f59e0b",ret:10.5},{id:"nasdaq",label:"NASDAQ",col:"#a78bfa",ret:14.2},{id:"btc",label:"BTC",col:"#fb923c",ret:85},{id:"gold",label:"Gold",col:"#fde68a",ret:7.2}];

const GrowthChart = ({assets}) => {
  const svgRef = useRef(null);
  const [period,setPeriod] = useState("1Y");
  const [benches,setBenches] = useState(["sp500"]);
  const [tooltip,setTooltip] = useState(null);

  const genBench = (startDate,endDate,annRet) => {
    const pts=[]; const s=new Date(startDate),e=new Date(endDate);
    const days=Math.ceil((e-s)/86400000); const dr=Math.pow(1+annRet/100,1/365)-1;
    let v=100;
    for(let i=0;i<=days;i+=Math.max(1,Math.floor(days/80))){
      const noise=(Math.sin(i*0.3)*0.007)+(Math.cos(i*0.17)*0.004);
      v=v*(1+dr+noise);
      const d=new Date(s); d.setDate(d.getDate()+i);
      pts.push({date:d.toISOString().slice(0,10),value:v});
    }
    return pts;
  };

  const portSeries = useMemo(()=>{
    const evts=[];
    assets.forEach(a=>{
      if(a.dcaLots&&a.dcaLots.length){
        a.dcaLots.forEach(l=>{ if(l.date&&l.qty&&l.price) evts.push({date:l.date,qty:parseFloat(l.qty),price:parseFloat(l.price),currentPrice:a.currentPrice}); });
      } else if(a.dateAdded){
        evts.push({date:a.dateAdded,qty:a.qty,price:a.avgCost,currentPrice:a.currentPrice});
      }
    });
    if(!evts.length) return [];
    evts.sort((a,b)=>a.date.localeCompare(b.date));
    const now=new Date(); const pd=PERIODS.find(p=>p.l===period)||PERIODS[4];
    let sd;
    if(pd.all) sd=new Date(evts[0].date);
    else if(pd.ytd) sd=new Date(now.getFullYear(),0,1);
    else{ sd=new Date(now); sd.setMonth(sd.getMonth()-pd.m); }
    const dates=[]; const cur=new Date(sd);
    const step=Math.max(1,Math.ceil((now-sd)/86400000/80));
    while(cur<=now){ dates.push(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+step); }
    if(!dates.includes(now.toISOString().slice(0,10))) dates.push(now.toISOString().slice(0,10));
    const pts = dates.map(date=>{
      const rel=evts.filter(e=>e.date<=date);
      if(!rel.length) return null;
      const nowTs=now.getTime();
      const val=rel.reduce((s,e)=>{ const bTs=new Date(e.date).getTime(),dTs=new Date(date).getTime(); const prog=nowTs>bTs?Math.min(1,(dTs-bTs)/(nowTs-bTs)):0; return s+e.qty*(e.price+(e.currentPrice-e.price)*prog); },0);
      return {date,value:val};
    }).filter(Boolean);
    if(!pts.length) return [];
    const base=pts[0].value||1;
    return pts.map(p=>({...p,norm:(p.value/base)*100}));
  },[assets,period]);

  const benchSeries = useMemo(()=>{
    if(!portSeries.length) return {};
    const sd=portSeries[0].date,ed=portSeries[portSeries.length-1].date;
    const r={};
    BENCHMARKS.forEach(b=>{ if(benches.includes(b.id)) r[b.id]=genBench(sd,ed,b.ret); });
    return r;
  },[portSeries,benches]);

  const chart = useMemo(()=>{
    if(!portSeries.length) return null;
    const W=780,H=260,PL=50,PR=12,PT=12,PB=32,cW=W-PL-PR,cH=H-PT-PB;
    const allV=[...portSeries.map(p=>p.norm)];
    Object.values(benchSeries).forEach(s=>s.forEach(p=>allV.push(p.value)));
    const mn=Math.min(...allV)*0.97,mx=Math.max(...allV)*1.03;
    const minTs=new Date(portSeries[0].date).getTime(),maxTs=Date.now();
    const xP=d=>PL+((new Date(d).getTime()-minTs)/(maxTs-minTs||1))*cW;
    const yP=v=>PT+(1-(v-mn)/(mx-mn||1))*cH;
    const portPath=portSeries.map((p,i)=>(i===0?"M":"L")+xP(p.date).toFixed(1)+","+yP(p.norm).toFixed(1)).join(" ");
    const areaPath=portPath+" L"+xP(portSeries[portSeries.length-1].date).toFixed(1)+","+(PT+cH)+" L"+PL+","+(PT+cH)+" Z";
    const bPaths={};
    Object.entries(benchSeries).forEach(([id,s])=>{ bPaths[id]=s.map((p,i)=>(i===0?"M":"L")+xP(p.date).toFixed(1)+","+yP(p.value).toFixed(1)).join(" "); });
    const range=mx-mn,step=range>200?50:range>50?20:range>20?10:5;
    const yTicks=[];
    for(let v=Math.ceil(mn/step)*step;v<=mx;v+=step) yTicks.push({v,y:yP(v)});
    const n=Math.min(5,portSeries.length);
    const xTicks=[];
    for(let i=0;i<n;i++){ const idx=Math.floor(i*(portSeries.length-1)/(n-1)); xTicks.push({date:portSeries[idx].date,x:xP(portSeries[idx].date)}); }
    const portRet=portSeries.length>=2?((portSeries[portSeries.length-1].value/portSeries[0].value)-1)*100:0;
    return {W,H,PL,PR,PT,PB,cW,cH,portPath,areaPath,bPaths,yTicks,xTicks,xP,yP,portRet,mn,mx};
  },[portSeries,benchSeries]);

  const portRet = portSeries.length>=2?((portSeries[portSeries.length-1].value/portSeries[0].value)-1)*100:0;

  const onMove = useCallback((e)=>{
    if(!chart||!svgRef.current||!portSeries.length) return;
    const rect=svgRef.current.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const prog=Math.max(0,Math.min(1,(cx-rect.left)/rect.width*chart.W-chart.PL)/chart.cW);
    const idx=Math.round(prog*(portSeries.length-1));
    const pt=portSeries[Math.max(0,Math.min(idx,portSeries.length-1))];
    if(!pt) return;
    const bv={};
    Object.entries(benchSeries).forEach(([id,s])=>{ const bi=Math.round(prog*(s.length-1)); bv[id]=s[Math.max(0,Math.min(bi,s.length-1))]&&s[Math.max(0,Math.min(bi,s.length-1))].value; });
    setTooltip({pt,bv,x:chart.xP(pt.date),y:chart.yP(pt.norm)});
  },[chart,portSeries,benchSeries]);

  return (
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,padding:20,marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)"}}>Portfolio Growth</span>
        <span style={{fontFamily:"var(--mono)",fontSize:18,fontWeight:800,color:portRet>=0?"var(--pos)":"var(--neg)"}}>{portSeries.length>=2?fPct(portRet):"—"}</span>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
        {PERIODS.map(p=><button key={p.l} onClick={()=>setPeriod(p.l)} style={{padding:"3px 11px",borderRadius:16,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid",borderColor:period===p.l?"var(--accent)":"var(--border)",background:period===p.l?"var(--accent)":"transparent",color:period===p.l?"#fff":"var(--muted)",fontFamily:"inherit"}}>{p.l}</button>)}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
        <span style={{fontSize:11,color:"var(--muted)",fontWeight:600}}>เทียบกับ:</span>
        {BENCHMARKS.map(b=><button key={b.id} onClick={()=>setBenches(p=>p.includes(b.id)?p.filter(x=>x!==b.id):[...p,b.id])} style={{padding:"2px 9px",borderRadius:14,fontSize:11,fontWeight:600,cursor:"pointer",border:"1px solid",borderColor:benches.includes(b.id)?b.col:"var(--border)",background:benches.includes(b.id)?b.col+"22":"transparent",color:benches.includes(b.id)?b.col:"var(--muted)",fontFamily:"inherit"}}>{b.label}</button>)}
      </div>
      {portSeries.length<2
        ? <div style={{textAlign:"center",padding:"40px 0",color:"var(--muted)",fontSize:13}}>เพิ่มสินทรัพย์พร้อมวันที่ซื้อเพื่อดูกราฟ</div>
        : <div style={{position:"relative"}}>
            <svg ref={svgRef} viewBox={"0 0 "+chart.W+" "+chart.H} style={{width:"100%",height:"auto",display:"block",cursor:"crosshair"}} onMouseMove={onMove} onMouseLeave={()=>setTooltip(null)} onTouchMove={onMove} onTouchEnd={()=>setTooltip(null)}>
              <defs>
                <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={portRet>=0?"#4ade80":"#f87171"} stopOpacity="0.25"/>
                  <stop offset="100%" stopColor={portRet>=0?"#4ade80":"#f87171"} stopOpacity="0.02"/>
                </linearGradient>
                <clipPath id="cc"><rect x={chart.PL} y={chart.PT} width={chart.cW} height={chart.cH}/></clipPath>
              </defs>
              {chart.yTicks.map((t,i)=><g key={i}><line x1={chart.PL} y1={t.y} x2={chart.PL+chart.cW} y2={t.y} stroke="#1e2d4a" strokeWidth="1"/><text x={chart.PL-5} y={t.y+4} textAnchor="end" fill="var(--muted)" fontSize="9">{t.v.toFixed(0)}</text></g>)}
              {chart.xTicks.map((t,i)=><text key={i} x={t.x} y={chart.PT+chart.cH+20} textAnchor="middle" fill="var(--muted)" fontSize="9">{new Date(t.date).toLocaleDateString("th-TH",{month:"short",year:"2-digit"})}</text>)}
              <line x1={chart.PL} y1={chart.yP(100)} x2={chart.PL+chart.cW} y2={chart.yP(100)} stroke="#334155" strokeWidth="1" strokeDasharray="4,3"/>
              {Object.entries(chart.bPaths).map(([id,path])=>{ const b=BENCHMARKS.find(x=>x.id===id); return <path key={id} d={path} fill="none" stroke={b.col} strokeWidth="1.5" strokeDasharray="5,3" clipPath="url(#cc)" opacity="0.8"/>; })}
              <path d={chart.areaPath} fill="url(#pg)" clipPath="url(#cc)"/>

// ── DCA Lot helper ─────────────────────────────────────────────────────────────
const calcDCA = (lots) => {
  const v=lots.filter(l=>l.qty&&l.price&&!isNaN(l.qty)&&!isNaN(l.price));
  if(!v.length) return {qty:0,avgCost:0};
  const tq=v.reduce((s,l)=>s+parseFloat(l.qty),0),tc=v.reduce((s,l)=>s+parseFloat(l.qty)*parseFloat(l.price),0);
  return {qty:tq,avgCost:tc/tq};
};
const newLot = ()=>({id:Date.now()+Math.random(),qty:"",price:"",date:new Date().toISOString().slice(0,10)});

// ── Tools Tab ──────────────────────────────────────────────────────────────────
const ToolsTab = ({assets,usdThb}) => {
  const [aid,setAid]=useState(assets[0]&&assets[0].id||null);
  const [amt,setAmt]=useState("100"),[freq,setFreq]=useState("monthly"),[mo,setMo]=useState("12"),[ret,setRet]=useState("10");
  const a=assets.find(x=>x.id===aid)||assets[0];
  const is={background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"8px 10px",borderRadius:7,fontSize:13,fontFamily:"inherit",outline:"none",width:"100%"};
  const be=useMemo(()=>{ if(!a) return null; return {be:a.avgCost,pct:((a.avgCost-a.currentPrice)/a.currentPrice)*100,bar:Math.min(100,(a.currentPrice/a.avgCost)*100)}; },[a]);
  const dcaR=useMemo(()=>{
    if(!a||!amt||!mo) return null;
    const amount=parseFloat(amt)||0,months=parseInt(mo)||0,r=(parseFloat(ret)/100)/12;
    const fv=r>0?amount*((Math.pow(1+r,months)-1)/r):amount*months;
    const newQty=amount*months/(a.currentPrice||1),tq=a.qty+newQty,tc=a.qty*a.avgCost+amount*months;
    return {invested:amount*months,newQty,newAvg:tc/tq,projected:fv+a.qty*a.currentPrice,projRet:((fv+a.qty*a.currentPrice)/tc-1)*100};
  },[a,amt,freq,mo,ret]);

  // Cost vs Market chart
  const lots=(a&&a.dcaLots&&a.dcaLots.filter(l=>l.qty&&l.price))||[];
  const sorted=[...lots].sort((a,b)=>a.date.localeCompare(b.date));
  let rq=0,rc=0;
  const cvmPts=sorted.map(l=>{ rq+=parseFloat(l.qty);rc+=parseFloat(l.qty)*parseFloat(l.price); return {date:l.date,buy:parseFloat(l.price),avg:rc/rq,qty:parseFloat(l.qty)}; });

  if(!a) return <div style={{textAlign:"center",padding:"60px 0",color:"var(--muted)",fontSize:13}}>เพิ่มสินทรัพย์ก่อนเพื่อใช้งาน</div>;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {assets.map(x=><button key={x.id} onClick={()=>setAid(x.id)} style={{padding:"4px 12px",borderRadius:16,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid",borderColor:aid===x.id?"var(--accent)":"var(--border)",background:aid===x.id?"var(--accent)":"transparent",color:aid===x.id?"#fff":"var(--muted)",fontFamily:"inherit"}}>{x.ticker}</button>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
        {/* Break-even */}
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,padding:18}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)",marginBottom:14}}>Break-even Analysis</div>
          {be&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[["ต้นทุนเฉลี่ย","$"+f2(a.avgCost),""],["ราคาปัจจุบัน","$"+f2(a.currentPrice),""],["Break-even","$"+f2(be.be),"warn"],["ต้องขึ้น/ลง",fPct(be.pct),be.pct>=0?"pos":"neg"]].map(([lb,vl,cl])=><div key={lb} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13}}>
              <span style={{color:"var(--muted)"}}>{lb}</span>
              <span style={{fontFamily:"var(--mono)",fontWeight:700,color:cl?("var(--"+cl+")"):"var(--text)"}}>{vl}</span>
            </div>)}
            <div style={{height:1,background:"var(--border)"}}/>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:4}}>{a.currentPrice>=a.avgCost?"🎉 เกิน break-even แล้ว!":"ยังขาดทุน — ต้องขึ้นอีก "+fPct(be.pct)}</div>
            <div style={{background:"var(--border)",borderRadius:6,height:8,overflow:"hidden"}}>
              <div style={{width:be.bar+"%",height:"100%",background:a.currentPrice>=a.avgCost?"linear-gradient(90deg,var(--pos),#22d3ee)":"linear-gradient(90deg,#f87171,var(--warn))",borderRadius:6,transition:"width .6s"}}/>
            </div>
            <div style={{background:"rgba(59,130,246,.06)",borderRadius:8,padding:"8px 12px",fontSize:12,color:"var(--muted)"}}>
              มูลค่า (THB): <strong style={{color:"var(--text)",fontFamily:"var(--mono)"}}>฿{f2(a.qty*a.currentPrice*usdThb,0)}</strong>
            </div>
          </div>}
        </div>
        {/* DCA Calc */}
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,padding:18}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)",marginBottom:14}}>DCA Calculator</div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {[["ซื้อต่อรอบ (USD)",<input key="a" type="number" value={amt} onChange={e=>setAmt(e.target.value)} style={is}/>],
              ["ความถี่",<select key="f" value={freq} onChange={e=>setFreq(e.target.value)} style={is}><option value="daily">ทุกวัน</option><option value="weekly">ทุกสัปดาห์</option><option value="monthly">ทุกเดือน</option></select>],
              ["นานกี่เดือน",<input key="m" type="number" value={mo} onChange={e=>setMo(e.target.value)} style={is}/>],
              ["คาด %/ปี",<input key="r" type="number" value={ret} onChange={e=>setRet(e.target.value)} style={is}/>]
            ].map(([lb,inp])=><div key={lb}><div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:4}}>{lb}</div>{inp}</div>)}
            {dcaR&&<>
              <div style={{height:1,background:"var(--border)"}}/>
              {[["ลงทุนเพิ่ม","$"+f2(dcaR.invested),""],["ต้นทุนเฉลี่ยใหม่","$"+f2(dcaR.newAvg),"warn"],["มูลค่าคาดการณ์","$"+f2(dcaR.projected),"pos"],["ผลตอบแทนคาด",fPct(dcaR.projRet),dcaR.projRet>=0?"pos":"neg"]].map(([lb,vl,cl])=><div key={lb} style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                <span style={{color:"var(--muted)"}}>{lb}</span>
                <span style={{fontFamily:"var(--mono)",fontWeight:700,color:cl?"var(--"+cl+")":"var(--text)"}}>{vl}</span>
              </div>)}
              <div style={{background:"rgba(59,130,246,.06)",borderRadius:8,padding:"8px 12px",fontSize:12,color:"var(--muted)"}}>≈ ฿{f2(dcaR.projected*usdThb,0)} THB</div>
            </>}
          </div>
        </div>
      </div>
      {/* Cost vs Market */}
      {cvmPts.length>=2&&<div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,padding:18}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)",marginBottom:12}}>Cost vs Market Price — {a.ticker}</div>
        <div style={{display:"flex",gap:14,marginBottom:10,flexWrap:"wrap",fontSize:11,color:"var(--muted)"}}>
          <span>🟡 ต้นทุนเฉลี่ย</span><span>🔵 ซื้อต่ำกว่าเฉลี่ย (ดี)</span><span>🔴 ซื้อสูงกว่าเฉลี่ย</span><span>🟢 ราคาปัจจุบัน</span>
        </div>
        {(()=>{
          const W=760,H=200,PL=55,PR=10,PT=10,PB=28,cW=W-PL-PR,cH=H-PT-PB;
          const allP=cvmPts.flatMap(p=>[p.buy,p.avg]).concat([a.currentPrice]);
          const mn=Math.min(...allP)*0.93,mx=Math.max(...allP)*1.07;
          const minTs=new Date(cvmPts[0].date).getTime(),maxTs=Date.now();
          const xP=d=>PL+((new Date(d).getTime()-minTs)/(maxTs-minTs||1))*cW;
          const yP=v=>PT+(1-(v-mn)/(mx-mn||1))*cH;
          const avgPath=cvmPts.map((p,i)=>(i===0?"M":"L")+xP(p.date).toFixed(1)+","+yP(p.avg).toFixed(1)).join(" ");
          const cpY=yP(a.currentPrice).toFixed(1);
          const range=mx-mn,step=range>50000?10000:range>10000?5000:range>1000?500:range>100?50:10;
          const yTk=[];for(let v=Math.ceil(mn/step)*step;v<=mx;v+=step) yTk.push({v,y:yP(v)});
          const mxQ=Math.max(...cvmPts.map(p=>p.qty));
          return <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
            <defs><clipPath id="cvm"><rect x={PL} y={PT} width={cW} height={cH}/></clipPath></defs>
            {yTk.map((t,i)=><g key={i}><line x1={PL} y1={t.y} x2={PL+cW} y2={t.y} stroke="#1e2d4a" strokeWidth="1"/><text x={PL-5} y={t.y+3} textAnchor="end" fill="var(--muted)" fontSize="8">{t.v>=1000?"$"+(t.v/1000).toFixed(0)+"k":"$"+t.v}</text></g>)}
            <line x1={PL} y1={cpY} x2={PL+cW} y2={cpY} stroke="var(--pos)" strokeWidth="1.5" strokeDasharray="5,3" clipPath="url(#cvm)"/>
            <text x={PL+cW-3} y={parseFloat(cpY)-4} textAnchor="end" fill="var(--pos)" fontSize="8" fontWeight="700">${f2(a.currentPrice)}</text>
            <path d={avgPath} fill="none" stroke="var(--warn)" strokeWidth="2" clipPath="url(#cvm)"/>
            {cvmPts.map((p,i)=>{ const r=3+(p.qty/mxQ)*5; return <circle key={i} cx={xP(p.date)} cy={yP(p.buy)} r={r} fill={p.buy>p.avg?"rgba(248,113,113,.75)":"rgba(96,165,250,.75)"} stroke={p.buy>p.avg?"#f87171":"#60a5fa"} strokeWidth="1.5" clipPath="url(#cvm)"/>; })}
          </svg>;
        })()}
      </div>}
    </div>
  );
};

// ── Goals Tab ──────────────────────────────────────────────────────────────────
const GoalsTab = ({assets,goals,saveGoal,deleteGoal,usdThb}) => {
  const [showForm,setShowForm]=useState(false),[editG,setEditG]=useState(null);
  const [form,setForm]=useState({name:"",targetUSD:"",deadline:"",note:""});
  const tv=assets.reduce((s,a)=>s+a.qty*a.currentPrice,0);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const save=()=>{ if(!form.name||!form.targetUSD) return; saveGoal({...form,id:editG&&editG.id||null}); setForm({name:"",targetUSD:"",deadline:"",note:""}); setShowForm(false);setEditG(null); };
  const is={background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"9px 12px",borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none",width:"100%"};
  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:18,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,var(--accent),#8b5cf6)"}}/>
          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)",marginBottom:6}}>มูลค่าปัจจุบัน</div>
          <div style={{fontFamily:"var(--mono)",fontSize:20,fontWeight:800}}>{fUSD(tv)}</div>
          <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>≈ ฿{f2(tv*usdThb,0)}</div>
        </div>
        <div onClick={()=>{setEditG(null);setForm({name:"",targetUSD:"",deadline:"",note:""});setShowForm(true);}} style={{background:"var(--card)",border:"1px dashed var(--border)",borderRadius:14,padding:18,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,transition:"border-color .2s"}}>
          <span style={{fontSize:28}}>+</span>
          <span style={{fontSize:12,color:"var(--muted)",fontWeight:600}}>เพิ่มเป้าหมาย</span>
        </div>
      </div>
      {showForm&&<div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:20}}>
        <div style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",color:"var(--muted)",marginBottom:14}}>{editG?"แก้ไขเป้าหมาย":"เพิ่มเป้าหมายใหม่"}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:4}}>ชื่อเป้าหมาย</div><input value={form.name} onChange={e=>sf("name",e.target.value)} placeholder="เช่น ซื้อบ้าน, 1 BTC" style={is}/></div>
          <div><div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:4}}>มูลค่าเป้าหมาย (USD)</div><input type="number" value={form.targetUSD} onChange={e=>sf("targetUSD",e.target.value)} placeholder="100000" style={is}/></div>
          <div><div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:4}}>วันที่เป้าหมาย</div><input type="date" value={form.deadline} onChange={e=>sf("deadline",e.target.value)} style={is}/></div>
          <div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:4}}>หมายเหตุ</div><input value={form.note} onChange={e=>sf("note",e.target.value)} style={is}/></div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={()=>{setShowForm(false);setEditG(null);}} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--muted)",padding:"7px 16px",borderRadius:9,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>ยกเลิก</button>
          <button onClick={save} disabled={!form.name||!form.targetUSD} style={{background:"var(--accent)",color:"#fff",border:"none",padding:"7px 18px",borderRadius:9,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:form.name&&form.targetUSD?1:.5,display:"flex",alignItems:"center",gap:6}}><Ic d={I.check} size={14}/> บันทึก</button>
        </div>
      </div>}
      {goals.length===0&&!showForm&&<div style={{textAlign:"center",padding:"48px 0",color:"var(--muted)",fontSize:13}}>ยังไม่มีเป้าหมาย — กด + เพื่อเริ่มต้น</div>}
      {goals.map(g=>{
        const tgt=parseFloat(g.targetUSD)||1,prog=Math.min(100,(tv/tgt)*100),done=tv>=tgt;
        const daysLeft=g.deadline?Math.ceil((new Date(g.deadline)-new Date())/86400000):null;
        const lots=assets.flatMap(a=>a.dcaLots||[]).filter(l=>l.date&&l.qty&&l.price);
        const mInv=lots.length>1?(()=>{ const s=[...lots].sort((a,b)=>a.date.localeCompare(b.date)); const mo=(new Date(s[s.length-1].date)-new Date(s[0].date))/(30*86400000)||1; return lots.reduce((sum,l)=>sum+parseFloat(l.qty)*parseFloat(l.price),0)/mo; })():0;
        const moToGoal=mInv>0&&!done?Math.ceil((tgt-tv)/mInv):null;
        return <div key={g.id} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <div>
              <div style={{fontWeight:800,fontSize:15,display:"flex",alignItems:"center",gap:8}}>{done?"🎉":"🎯"} {g.name}
                {done&&<span style={{background:"rgba(74,222,128,.15)",color:"var(--pos)",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10}}>บรรลุแล้ว!</span>}
              </div>
              {g.note&&<div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{g.note}</div>}
            </div>
            <div style={{display:"flex",gap:4}}>
              <button onClick={()=>{setEditG(g);setForm({...g});setShowForm(true);}} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",padding:5,display:"flex",borderRadius:6}}><Ic d={I.edit} size={14}/></button>
              <button onClick={()=>deleteGoal(g.id)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",padding:5,display:"flex",borderRadius:6}}><Ic d={I.trash} size={14}/></button>
            </div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:7}}>
            <span style={{fontFamily:"var(--mono)",fontWeight:700}}>{fUSD(tv)} <span style={{color:"var(--muted)",fontWeight:400}}>/ {fUSD(tgt)}</span></span>
            <span style={{fontFamily:"var(--mono)",fontWeight:800,color:done?"var(--pos)":"var(--accent)"}}>{prog.toFixed(1)}%</span>
          </div>
          <div style={{background:"var(--border)",borderRadius:8,height:11,overflow:"hidden",marginBottom:12,position:"relative"}}>
            <div style={{width:prog+"%",height:"100%",borderRadius:8,transition:"width .8s",background:done?"linear-gradient(90deg,var(--pos),#22d3ee)":prog>75?"linear-gradient(90deg,var(--accent),#8b5cf6)":"linear-gradient(90deg,#1e3a5f,var(--accent))"}}/>
            {prog>12&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:9,fontSize:9,color:"#fff",fontWeight:700}}>{prog.toFixed(0)}%</div>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8}}>
            {[["ยังขาดอีก",done?"✓ บรรลุ!":fUSD(tgt-tv),done?"pos":"warn"],g.deadline&&["วันที่เป้าหมาย",daysLeft<=0?"หมดเวลา":daysLeft+" วัน",daysLeft<30&&daysLeft>0?"neg":"text"],moToGoal&&["ถึงเป้าใน (DCA)","~"+moToGoal+" เดือน","accent2"],["เป้า (THB)","฿"+f2(tgt*usdThb,0),"muted"]].filter(Boolean).map(([lb,vl,cl])=>(
              <div key={lb} style={{background:"var(--surface)",borderRadius:9,padding:"9px 12px"}}>
                <div style={{fontSize:10,color:"var(--muted)",marginBottom:3}}>{lb}</div>
                <div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:12,color:"var(--"+cl+")"}}>{vl}</div>
              </div>
            ))}
          </div>
        </div>;
      })}
    </div>
  );
};

// ── Main App ───────────────────────────────────────────────────────────────────
function App() {
  const SK="portfolioTH_v4";
  const load=()=>{ try{const s=localStorage.getItem(SK);return s?JSON.parse(s).assets:SAMPLE;}catch{return SAMPLE;} };

  // ALL STATE FIRST
  const [assets,     setAssets]     = useState(load);
  const [tab,        setTab]        = useState("dashboard");
  const [showModal,  setShowModal]  = useState(false);
  const [editAsset,  setEditAsset]  = useState(null);
  const [showBackup, setShowBackup] = useState(false);
  const [showLog,    setShowLog]    = useState(false);
  const [showSheets, setShowSheets] = useState(false);
  const [filterType, setFilterType] = useState("ทั้งหมด");
  const [sortKey,    setSortKey]    = useState("value");
  const [saved,      setSaved]      = useState(false);
  const [pxStatus,   setPxStatus]   = useState("idle");
  const [pxError,    setPxError]    = useState("");
  const [pxLog,      setPxLog]      = useState(()=>{ try{return JSON.parse(localStorage.getItem(SK)||"{}").priceLog||[];}catch{return [];} });
  const [lastUpd,    setLastUpd]    = useState(()=>{ try{return JSON.parse(localStorage.getItem(SK)||"{}").lastUpdated||null;}catch{return null;} });
  const [autoMin,    setAutoMin]    = useState(0);
  const [delTarget,  setDelTarget]  = useState(null);
  const [darkMode,   setDarkMode]   = useState(()=>{ try{return localStorage.getItem("theme")!=="light";}catch{return true;} });
  const [usdThb,     setUsdThb]     = useState(()=>{ try{return parseFloat(localStorage.getItem("usdThb"))||35.5;}catch{return 35.5;} });
  const [goals,      setGoals]      = useState(()=>{ try{return JSON.parse(localStorage.getItem("dca_goals")||"[]");}catch{return [];} });
  const [sheetUrl,   setSheetUrl]   = useState(()=>localStorage.getItem("gsheet_url")||"");
  const [sheetTok,   setSheetTok]   = useState(()=>localStorage.getItem("gsheet_token")||"");
  const [syncSt,     setSyncSt]     = useState("idle");
  const [syncMsg,    setSyncMsg]    = useState("");

  // EFFECTS
  useEffect(()=>{ document.documentElement.setAttribute("data-theme",darkMode?"dark":"light"); localStorage.setItem("theme",darkMode?"dark":"light"); },[darkMode]);
  useEffect(()=>{ try{localStorage.setItem(SK,JSON.stringify({assets,lastUpdated:lastUpd,priceLog:pxLog.slice(-20)}));setSaved(true);setTimeout(()=>setSaved(false),1500);}catch{} },[assets]);

  // AUTO REFRESH
  const timerRef=useRef(null);
  useEffect(()=>{
    clearInterval(timerRef.current);
    if(autoMin>0){ timerRef.current=setInterval(()=>{ if(navigator.onLine) doUpdatePrices(); },autoMin*60000); }
    return ()=>clearInterval(timerRef.current);
  },[autoMin,assets]);

  // PRICE UPDATE
  const doUpdatePrices=useCallback(async()=>{
    if(!assets.length) return;
    setPxStatus("loading"); setPxError("");
    fetch("https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=thb").then(r=>r.json()).then(d=>{ if(d&&d.tether&&d.tether.thb){const r=parseFloat(d.tether.thb);setUsdThb(r);localStorage.setItem("usdThb",String(r));} }).catch(()=>{});
    try{
      const prices=await fetchPrices(assets);
      const now=new Date().toISOString();
      setAssets(prev=>prev.map(a=>{ const p=prices[a.ticker.toUpperCase()]; return p?{...a,currentPrice:p}:a; }));
      setLastUpd(now);
      setPxLog(prev=>[...prev.slice(-19),{time:now,prices}]);
      setPxStatus("done"); setTimeout(()=>setPxStatus("idle"),3000);
    }catch(e){ setPxError(e.message); setPxStatus("error"); setTimeout(()=>setPxStatus("idle"),5000); }
  },[assets]);

  // GOOGLE SHEETS SYNC
  // Apps Script fetch helper
  // GET for read-only (ping, load) — no CORS issue
  // POST with text/plain for write (save, sync) — avoids CORS preflight
  const sheetApi=async(action,body={})=>{
    if(!sheetUrl||!sheetTok) throw new Error("ยังไม่ได้ตั้งค่า Google Sheets");
    const baseUrl = sheetUrl+"?action="+action+"&token="+encodeURIComponent(sheetTok);

    if(action==="ping"||action==="load"){
      // GET — safe, no preflight
      const r = await fetch(baseUrl, {method:"GET", redirect:"follow"});
      const text = await r.text();
      let d; try{d=JSON.parse(text);}catch(e){throw new Error("Bad response: "+text.slice(0,80));}
      if(!d.ok) throw new Error(d.error||"Error"); return d;
    } else {
      // POST with Content-Type: text/plain — does NOT trigger CORS preflight
      // Apps Script accepts this and reads e.postData.contents
      const r = await fetch(baseUrl, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=UTF-8"},
        body: JSON.stringify({action, token:sheetTok, ...body}),
        redirect:"follow"
      });
      const text = await r.text();
      let d; try{d=JSON.parse(text);}catch(e){throw new Error("Bad response: "+text.slice(0,80));}
      if(!d.ok) throw new Error(d.error||"Error"); return d;
    }
  };
  const doSync=async(action)=>{
    setSyncSt("loading"); setSyncMsg("กำลัง "+action+"...");
    try{
      const now=new Date().toISOString();
      let result;
      if(action==="save")       result=await sheetApi("save",{assets:assets.map(a=>({...a,syncedAt:now}))});
      else if(action==="load")  result=await sheetApi("load");
      else                      result=await sheetApi("sync",{assets:assets.map(a=>({...a,syncedAt:a.syncedAt||now}))});
      if((action==="load"||action==="sync")&&result.assets) setAssets(result.assets);
      localStorage.setItem("gsheet_lastSync",now);
      setSyncSt("done"); setSyncMsg("✅ "+(action==="save"?"Save":action==="load"?"Load":"Sync")+" สำเร็จ • "+new Date().toLocaleTimeString("th-TH"));
      setTimeout(()=>setSyncSt("idle"),4000);
    }catch(e){ setSyncSt("error"); setSyncMsg("❌ "+e.message+(e.message.includes("Failed to fetch")?" — เช็คว่า Deploy เป็น Anyone และ URL ลงท้าย /exec":"")); setTimeout(()=>setSyncSt("idle"),8000); }
  };

  // ASSET CRUD
  const saveAsset=(data)=>{ if(editAsset) setAssets(a=>a.map(x=>x.id===editAsset.id?{...data,id:editAsset.id}:x)); else setAssets(a=>[...a,{...data,id:Date.now()}]); setShowModal(false);setEditAsset(null); };
  const deleteAsset=(id)=>{ const a=assets.find(x=>x.id===id); setDelTarget({id,name:(a&&a.name)||(a&&a.ticker)||"รายการนี้"}); };
  const confirmDel=()=>{ if(delTarget) setAssets(a=>a.filter(x=>x.id!==delTarget.id)); setDelTarget(null); };
  const saveGoal=(g)=>{ const u=g.id?goals.map(x=>x.id===g.id?g:x):[...goals,{...g,id:Date.now()}]; setGoals(u);localStorage.setItem("dca_goals",JSON.stringify(u)); };
  const deleteGoal=(id)=>{ const g=goals.filter(x=>x.id!==id); setGoals(g);localStorage.setItem("dca_goals",JSON.stringify(g)); };
  const exportCSV=()=>{
    const header=["Date","Ticker","Name","Type","Qty","AvgCost","CurrentPrice","Currency","Cost","Value","PnL","PnL%","Sector","Note"];
    const rows=withPnl.map(a=>[a.dateAdded||"",a.ticker,a.name,a.type,a.qty,a.avgCost,a.currentPrice,a.currency,a.cost.toFixed(2),a.value.toFixed(2),a.pnlAmt.toFixed(2),a.pnlPct.toFixed(2),a.sector||"",a.note||""]);
    const lotH=[["","--- DCA LOTS ---"],["Ticker","Date","Price","Qty","Cost"]];
    const lotR=withPnl.flatMap(a=>(a.dcaLots||[]).map(l=>[a.ticker,l.date,l.price,l.qty,(parseFloat(l.price)*parseFloat(l.qty)).toFixed(2)]));
    const csv=[header,...rows,[""],...lotH,...lotR].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(",")).join("\n");
    const uri="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    const el=document.createElement("a");el.href=uri;el.download="portfolio_"+new Date().toISOString().slice(0,10)+".csv";document.body.appendChild(el);el.click();document.body.removeChild(el);
  };

  // COMPUTED
  const withPnl=useMemo(()=>assets.map(a=>({...a,...calcPnl(a)})),[assets]);
  const filtered=useMemo(()=>{ let r=filterType==="ทั้งหมด"?withPnl:withPnl.filter(a=>a.type===filterType); return [...r].sort((a,b)=>sortKey==="value"?b.value-a.value:sortKey==="pnlPct"?b.pnlPct-a.pnlPct:sortKey==="pnlAmt"?b.pnlAmt-a.pnlAmt:a.name.localeCompare(b.name)); },[withPnl,filterType,sortKey]);
  const summary=useMemo(()=>{ const tc=withPnl.reduce((s,a)=>s+a.cost,0),tv=withPnl.reduce((s,a)=>s+a.value,0),tp=tv-tc; return {tc,tv,tp,tpp:tc>0?(tp/tc)*100:0,win:withPnl.filter(a=>a.pnlAmt>0).length,lose:withPnl.filter(a=>a.pnlAmt<0).length}; },[withPnl]);
  const alloc=useMemo(()=>{ const g={}; withPnl.forEach(a=>{g[a.type]=(g[a.type]||0)+a.value;}); return Object.entries(g).map(([label,value])=>({label,value})); },[withPnl]);
  const topG=useMemo(()=>[...withPnl].sort((a,b)=>b.pnlPct-a.pnlPct)[0],[withPnl]);
  const topL=useMemo(()=>[...withPnl].sort((a,b)=>a.pnlPct-b.pnlPct)[0],[withPnl]);

  const S = {/* reusable inline style shortcuts */
    card:{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,padding:20},
    btn:{background:"var(--accent)",color:"#fff",border:"none",padding:"8px 16px",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:6},
    ghost:{background:"transparent",border:"1px solid var(--border)",color:"var(--muted)",padding:"8px 14px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:6},
    iconBtn:{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",padding:6,borderRadius:6,display:"inline-flex",alignItems:"center",justifyContent:"center"},
  };

  const lastSync=localStorage.getItem("gsheet_lastSync");

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"var(--bg)"}}>
      <style>{`
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .spin{animation:spin 1s linear infinite}
        .pulse{animation:pulse 1s infinite}
        .pos{color:var(--pos)} .neg{color:var(--neg)} .muted{color:var(--muted)}
        ::-webkit-scrollbar{width:4px;height:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        a{color:var(--accent2)}
        button:hover{opacity:.85}
        @media(max-width:600px){.hide-sm{display:none!important}}
        @media(max-width:900px){.grid-2col{grid-template-columns:1fr!important}}
      `}</style>

      {/* HEADER */}
      <header style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"0 20px",height:58,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10,fontWeight:800,fontSize:17,letterSpacing:"-.3px"}}>
          <div style={{width:28,height:28,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>📊</div>
          PortfolioTH
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          {saved&&<span style={{fontSize:11,color:"var(--pos)",display:"flex",alignItems:"center",gap:3}}><Ic d={I.check} size={11}/> บันทึกแล้ว</span>}
          <button onClick={()=>{ fetch("https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=thb").then(r=>r.json()).then(d=>{ if(d&&d.tether&&d.tether.thb){const r=parseFloat(d.tether.thb);setUsdThb(r);localStorage.setItem("usdThb",String(r));} }).catch(()=>{}); }} style={{...S.ghost,padding:"5px 10px",fontSize:11}} title="คลิกอัพเดทอัตรา">
            <Ic d={I.dollar} size={12}/> {usdThb.toFixed(2)} ฿/$
          </button>
          <button onClick={()=>setDarkMode(d=>!d)} style={{...S.iconBtn}} title="เปลี่ยน theme"><Ic d={darkMode?I.sun:I.moon} size={16}/></button>
          <button onClick={exportCSV} style={{...S.ghost,padding:"6px 10px"}} className="hide-sm"><Ic d={I.csv} size={14}/> CSV</button>
          <button onClick={()=>setShowLog(true)} style={{...S.iconBtn}}><Ic d={I.clock} size={16}/></button>
          <button onClick={()=>setShowBackup(true)} style={{...S.ghost,padding:"6px 10px"}} className="hide-sm"><Ic d={I.cloud} size={14}/> Backup</button>
          <button onClick={()=>{setEditAsset(null);setShowModal(true);}} style={{...S.btn,padding:"7px 14px"}}><Ic d={I.plus} size={14}/> เพิ่ม</button>
        </div>
      </header>

      {/* TABS */}
      <nav style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"0 20px",display:"flex",gap:4,overflowX:"auto"}}>
        {[["dashboard",I.pie,"Dashboard"],["portfolio",I.chart,"พอร์ต"],["analysis",I.tup,"วิเคราะห์"],["tools",I.calc,"เครื่องมือ"],["goals",I.target,"เป้าหมาย"]].map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"13px 16px",fontSize:13,fontWeight:600,color:tab===id?"var(--accent2)":"var(--muted)",cursor:"pointer",border:"none",borderBottom:"2px solid "+(tab===id?"var(--accent)":"transparent"),background:"none",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap",fontFamily:"inherit",transition:"all .2s"}}>
            <Ic d={icon} size={14}/>{label}
          </button>
        ))}
      </nav>

      <main style={{flex:1,padding:"20px",maxWidth:1400,margin:"0 auto",width:"100%",display:"flex",flexDirection:"column",gap:16}}>

        {/* PRICE PANEL */}
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              {pxStatus==="loading"&&<span style={{fontSize:12,fontWeight:600,color:"var(--warn)",display:"flex",alignItems:"center",gap:5}}><span className="pulse" style={{width:7,height:7,borderRadius:"50%",background:"var(--warn)",display:"inline-block"}}/> กำลังดึงราคา...</span>}
              {pxStatus==="done"&&<span style={{fontSize:12,fontWeight:600,color:"var(--pos)",display:"flex",alignItems:"center",gap:5}}><Ic d={I.check} size={12}/> อัพเดทแล้ว</span>}
              {pxStatus==="idle"&&<span style={{fontSize:12,color:"var(--muted)"}}>อัพเดทล่าสุด: {ago(lastUpd)}</span>}
              {pxStatus==="error"&&<span style={{fontSize:12,color:"var(--neg)"}}>❌ {pxError}</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:11,color:"var(--muted)"}}>Auto:</span>
              {[0,5,15,30,60].map(m=><button key={m} onClick={()=>setAutoMin(m)} style={{padding:"2px 8px",borderRadius:12,fontSize:11,fontWeight:700,cursor:"pointer",border:"1px solid",borderColor:autoMin===m?"var(--accent)":"var(--border)",background:autoMin===m?"var(--accent)":"transparent",color:autoMin===m?"#fff":"var(--muted)",fontFamily:"inherit"}}>{m===0?"ปิด":m+"m"}</button>)}
            </div>
          </div>
          <button onClick={doUpdatePrices} disabled={pxStatus==="loading"} style={{...S.btn,background:"linear-gradient(135deg,#3b82f6,#6366f1)",opacity:pxStatus==="loading"?.6:1}}>
            <Ic d={I.refresh} size={14} cls={pxStatus==="loading"?"spin":""}/> {pxStatus==="loading"?"กำลังดึง...":"อัพเดทราคา"}
          </button>
        </div>

        {/* GOOGLE SHEETS SYNC BAR */}
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flex:1,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:600}}>
              <span style={{fontSize:9,color:sheetUrl?"var(--pos)":"var(--muted)"}}>●</span>
              {sheetUrl?"Google Sheets เชื่อมต่อแล้ว":"ยังไม่ได้เชื่อมต่อ Google Sheets"}
            </div>
            {syncSt!=="idle"&&<span style={{fontSize:12,color:syncSt==="loading"?"var(--warn)":syncSt==="done"?"var(--pos)":"var(--neg)",maxWidth:280,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {syncSt==="loading"&&<span className="spin" style={{display:"inline-block",marginRight:4}}>⟳</span>}{syncMsg}
            </span>}
            {syncSt==="idle"&&sheetUrl&&lastSync&&<span style={{fontSize:11,color:"var(--muted)"}}>Sync ล่าสุด: {new Date(lastSync).toLocaleString("th-TH")}</span>}
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {sheetUrl&&<>
              <button onClick={()=>doSync("sync")} disabled={syncSt==="loading"} style={{background:"linear-gradient(135deg,#1a73e8,#4285f4)",color:"#fff",border:"none",padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:syncSt==="loading"?.6:1}}>⇄ Sync</button>
              <button onClick={()=>doSync("save")} disabled={syncSt==="loading"} style={{...S.ghost,padding:"5px 10px",fontSize:12}} className="hide-sm">↑ Save</button>
              <button onClick={()=>doSync("load")} disabled={syncSt==="loading"} style={{...S.ghost,padding:"5px 10px",fontSize:12}} className="hide-sm">↓ Load</button>
            </>}
            <button onClick={()=>setShowSheets(true)} style={{...S.ghost,padding:"6px 12px",fontSize:12}}>{sheetUrl?"⚙️":"🔗 เชื่อมต่อ"}</button>
          </div>
        </div>

        {/* DASHBOARD TAB */}
        {tab==="dashboard"&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14}}>
            {[
              ["มูลค่าพอร์ตรวม",fUSD(summary.tv),"≈ ฿"+f2(summary.tv*usdThb,0)+" • "+assets.length+" สินทรัพย์",""],
              ["กำไร/ขาดทุนรวม",fUSD(summary.tp),fPct(summary.tpp)+" จากต้นทุน",clr(summary.tp)],
              ["ต้นทุนรวม",fUSD(summary.tc),"Cost Basis",""],
              ["Win / Loss",""+(summary.win)+" | "+summary.lose,"กำไร | ขาดทุน",""],
            ].map(([lb,vl,sub,cl])=>(
              <div key={lb} style={{...S.card,position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,var(--accent),#8b5cf6)"}}/>
                <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--muted)",marginBottom:7}}>{lb}</div>
                <div style={{fontFamily:"var(--mono)",fontSize:20,fontWeight:800,color:cl?"var(--"+cl+")":"var(--text)"}}>{vl}</div>
                <div style={{fontSize:11,color:"var(--muted)",marginTop:5}}>{sub}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}} className="grid-2col">
            {topG&&<div style={{...S.card,display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:40,height:40,borderRadius:12,background:"rgba(74,222,128,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🏆</div>
              <div><div style={{fontSize:11,color:"var(--muted)"}}>Best Performer</div><div style={{fontWeight:700,fontSize:14,marginTop:2}}>{topG.name}</div><div style={{fontFamily:"var(--mono)",fontSize:13,color:"var(--pos)",marginTop:2}}>{fPct(topG.pnlPct)}</div></div>
            </div>}
            {topL&&<div style={{...S.card,display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:40,height:40,borderRadius:12,background:"rgba(248,113,113,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>📉</div>
              <div><div style={{fontSize:11,color:"var(--muted)"}}>Worst Performer</div><div style={{fontWeight:700,fontSize:14,marginTop:2}}>{topL.name}</div><div style={{fontFamily:"var(--mono)",fontSize:13,color:"var(--neg)",marginTop:2}}>{fPct(topL.pnlPct)}</div></div>
            </div>}
          </div>
          <GrowthChart assets={assets}/>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16}} className="grid-2col">
            <div style={S.card}><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)",marginBottom:14}}>P&amp;L by Asset</div><BarChart assets={assets}/></div>
            <div style={S.card}><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)",marginBottom:14}}>Allocation</div>{alloc.length>0&&<DonutChart data={alloc}/>}</div>
          </div>
        </>}

        {/* PORTFOLIO TAB */}
        {tab==="portfolio"&&<div style={S.card}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexWrap:"wrap"}}>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["ทั้งหมด",...TYPES].map(t=><button key={t} onClick={()=>setFilterType(t)} style={{padding:"4px 12px",borderRadius:16,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid",borderColor:filterType===t?"var(--accent)":"var(--border)",background:filterType===t?"var(--accent)":"transparent",color:filterType===t?"#fff":"var(--muted)",fontFamily:"inherit"}}>{t}</button>)}
            </div>
            <select value={sortKey} onChange={e=>setSortKey(e.target.value)} style={{marginLeft:"auto",background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"5px 9px",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
              <option value="value">Sort: มูลค่า</option><option value="pnlPct">Sort: %P&amp;L</option><option value="pnlAmt">Sort: P&L</option><option value="name">Sort: ชื่อ</option>
            </select>
          </div>
          {filtered.length===0?<div style={{textAlign:"center",padding:"50px 0",color:"var(--muted)"}}><div style={{fontSize:18,fontWeight:700,marginBottom:8}}>ยังไม่มีสินทรัพย์</div><div style={{fontSize:13}}>กด "+ เพิ่ม" เพื่อเริ่มต้น</div></div>:
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr>{["สินทรัพย์","ประเภท","จำนวน","ราคา","มูลค่า","P&amp;L","%P&amp;L","หมายเหตุ",""].map((h,i)=><th key={i} style={{textAlign:"left",padding:"9px 12px",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",color:"var(--muted)",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>{filtered.map(a=><tr key={a.id} style={{borderBottom:"1px solid var(--surface)"}}>
              <td style={{padding:"11px 12px"}}><div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:a.type==="หุ้น"?"#60a5fa":a.type==="คริปโต"?"#f59e0b":a.type==="ETF"?"#34d399":a.type==="กองทุน"?"#f472b6":"#a78bfa",flexShrink:0,display:"inline-block"}}/>
                <div><div style={{fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:6}}>{a.ticker}{a.dcaLots&&a.dcaLots.length>1&&<span style={{background:"rgba(251,191,36,.12)",color:"var(--warn)",fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:8}}>DCA {a.dcaLots.length}x</span>}</div>
                <div style={{fontSize:10,color:"var(--muted)"}}>{a.name}</div>
                <div style={{fontFamily:"var(--mono)",fontSize:10,color:"#94a3b8",display:"none"}} className="show-sm-price">{f2(a.currentPrice)} {a.currency}</div></div>
              </div></td>
              <td style={{padding:"11px 12px",fontSize:11,color:"var(--muted)"}}>{a.type}</td>
              <td style={{padding:"11px 12px",fontFamily:"var(--mono)",fontSize:12}}>{f2(a.qty,a.qty%1===0?0:4)}</td>
              <td style={{padding:"11px 12px",fontFamily:"var(--mono)",fontSize:12}}>{f2(a.currentPrice)} <span style={{fontSize:10,color:"var(--muted)"}}>{a.currency}</span></td>
              <td style={{padding:"11px 12px",fontFamily:"var(--mono)",fontSize:12,fontWeight:600}}>{f2(a.value)}</td>
              <td style={{padding:"11px 12px",fontFamily:"var(--mono)",fontSize:12,color:a.pnlAmt>=0?"var(--pos)":"var(--neg)"}}>{a.pnlAmt>=0?"+":""}{f2(a.pnlAmt)}</td>
              <td style={{padding:"11px 12px",fontFamily:"var(--mono)",fontSize:12,fontWeight:700,color:a.pnlPct>=0?"var(--pos)":"var(--neg)"}}>{fPct(a.pnlPct)}</td>
              <td style={{padding:"11px 12px",fontSize:11,color:"var(--muted)",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.note||"—"}</td>
              <td style={{padding:"11px 12px"}}><div style={{display:"flex",gap:3}}>
                <button onClick={()=>{setEditAsset(a);setShowModal(true);}} style={{...S.iconBtn,padding:5}}><Ic d={I.edit} size={14}/></button>
                <button onClick={()=>deleteAsset(a.id)} style={{...S.iconBtn,padding:5}}><Ic d={I.trash} size={14}/></button>
              </div></td>
            </tr>)}</tbody>
          </table></div>}
        </div>}

        {/* ANALYSIS TAB */}
        {tab==="analysis"&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:14}}>
            {TYPES.map(type=>{ const items=withPnl.filter(a=>a.type===type); if(!items.length) return null; const tv=items.reduce((s,a)=>s+a.value,0),tc=items.reduce((s,a)=>s+a.cost,0),tp=items.reduce((s,a)=>s+a.pnlAmt,0),pp=tc>0?(tp/tc)*100:0;
              return <div key={type} style={{...S.card,position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,var(--accent),#8b5cf6)"}}/>
                <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--muted)",marginBottom:7}}>{type}</div>
                <div style={{fontFamily:"var(--mono)",fontSize:18,fontWeight:800}}>{f2(tv)}</div>
                <div style={{fontSize:11,marginTop:4,color:pp>=0?"var(--pos)":"var(--neg)"}}>{fPct(pp)} • {items.length} รายการ</div>
              </div>; })}
          </div>
          <div style={S.card}>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)",marginBottom:14}}>Sector Breakdown</div>
            <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr>{["Sector","สินทรัพย์","มูลค่ารวม","ต้นทุนรวม","P&amp;L","%P&amp;L"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 12px",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",color:"var(--muted)",borderBottom:"1px solid var(--border)"}}>{h}</th>)}</tr></thead>
              <tbody>{(()=>{ const s={}; withPnl.forEach(a=>{const k=a.sector||"Other";if(!s[k])s[k]=[];s[k].push(a);});
                return Object.entries(s).map(([sec,items])=>{ const v=items.reduce((s,a)=>s+a.value,0),c=items.reduce((s,a)=>s+a.cost,0),pa=v-c,pp=c>0?(pa/c)*100:0;
                  return <tr key={sec} style={{borderBottom:"1px solid var(--surface)"}}><td style={{padding:"10px 12px",fontWeight:700}}>{sec}</td><td style={{padding:"10px 12px",fontFamily:"var(--mono)",fontSize:11,color:"var(--muted)"}}>{items.map(i=>i.ticker).join(", ")}</td><td style={{padding:"10px 12px",fontFamily:"var(--mono)",fontSize:12}}>{f2(v)}</td><td style={{padding:"10px 12px",fontFamily:"var(--mono)",fontSize:12}}>{f2(c)}</td><td style={{padding:"10px 12px",fontFamily:"var(--mono)",fontSize:12,color:pa>=0?"var(--pos)":"var(--neg)"}}>{pa>=0?"+":""}{f2(pa)}</td><td style={{padding:"10px 12px",fontFamily:"var(--mono)",fontSize:12,fontWeight:700,color:pp>=0?"var(--pos)":"var(--neg)"}}>{fPct(pp)}</td></tr>;
                });
              })()}</tbody>
            </table></div>
          </div>
        </>}

        {tab==="tools"&&<ToolsTab assets={assets} usdThb={usdThb}/>}
        {tab==="goals"&&<GoalsTab assets={assets} goals={goals} saveGoal={saveGoal} deleteGoal={deleteGoal} usdThb={usdThb}/>}

      </main>

      {/* MODALS */}
      {showModal&&<AssetModal asset={editAsset} onSave={saveAsset} onClose={()=>{setShowModal(false);setEditAsset(null);}}/>}
      {showBackup&&<BackupModal assets={assets} onClose={()=>setShowBackup(false)} onRestore={d=>{setAssets(d);setShowBackup(false);}}/>}
      {showLog&&<LogModal log={pxLog} onClose={()=>setShowLog(false)}/>}
      {showSheets&&<SheetsModal onClose={()=>setShowSheets(false)} initialUrl={sheetUrl} initialToken={sheetTok} onSaved={(u,t)=>{setSheetUrl(u);setSheetTok(t);localStorage.setItem("gsheet_url",u);localStorage.setItem("gsheet_token",t);}}/>}
      {delTarget&&<ConfirmDialog name={delTarget.name} onConfirm={confirmDel} onCancel={()=>setDelTarget(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
