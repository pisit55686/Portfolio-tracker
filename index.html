<meta charset="UTF-8"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070c14;--surface:#0d1525;--card:#111b2e;--border:#1e2d4a;

  --positive:#4ade80;--negative:#f87171;--warning:#fbbf24;

}
[data-theme="light"]{
  --bg:#f0f4f8;--surface:#fff;--card:#fff;--border:#d1dbe8;
  --text:#1a2332;--muted:#6b7f96;--accent:#2563eb;--accent2:#3b82f6;
}
html,body,#root{min-height:100%;background:var(--bg)}
body{font-family:'Noto Sans Thai',sans-serif;color:var(--text);background:var(--bg)}

</head>
<body>
<div id="root"><div style="color:#4ade80;padding:40px;font-family:monospace">Loading...</div></div>

  window.onerror = function(msg, url, line, col, error) {
    console.error('Global error:', error || msg);
    alert('Error: ' + (error?.message || msg));
    return false;

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ── Icons ────────────────────────────────────────────────────────────────────
const Icon = ({ d, size=18 }) => (

const I = {

  trash:   "M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6",

  moon:    "M21 12.79A10 10 0 1 1 11.21 3 7 7 0 0 0 21 12.79z",
  target:  "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12zM12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z",
  calc:    "M4 2h16a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zM8 6h2M14 6h2M8 10h2M14 10h2M8 14h8",
  alert:   "M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01",
  bell:    "M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0",
  sheets:  "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M8 13h8M8 17h5",
  link:    "M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71",
  act:     "M22 12h-4l-3 9L9 3l-3 9H2",
  globe:   "M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z",
};

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt   = (n, d=2) => (n==null||isNaN(n)) ? "—" : Number(n).toLocaleString("th-TH",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtUSD= (n) => (n==null||isNaN(n)) ? "—" : (n<0?"-$":"$")+Math.abs(Number(n)).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
const pct   = (n) => (n==null||isNaN(n)) ? "—" : (n>=0?"+":"")+Number(n).toFixed(2)+"%";
const pc    = (n) => n>0?"positive":n<0?"negative":"neutral";
const ago   = (iso) => { if(!iso) return "ไม่เคย"; const d=(Date.now()-new Date(iso))/1000; if(d<60) return Math.floor(d)+"s ago"; if(d<3600) return Math.floor(d/60)+"m ago"; if(d<86400) return Math.floor(d/3600)+"h ago"; return new Date(iso).toLocaleDateString("th-TH"); };
const ls    = { get:(k,f=null)=>{ try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):f;}catch{return f;} }, set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch{} } };

const TYPES = ["หุ้น","คริปโต","ETF","กองทุน","อื่นๆ"];
const CCYS  = ["USD","THB","BTC","ETH"];
const CRYPTO_MAP = {BTC:"bitcoin",ETH:"ethereum",BNB:"binancecoin",SOL:"solana",ADA:"cardano",XRP:"ripple",DOT:"polkadot",DOGE:"dogecoin",AVAX:"avalanche-2",MATIC:"matic-network",LINK:"chainlink",LTC:"litecoin"};
const SAMPLE = [
  {id:1,name:"Apple Inc.",ticker:"AAPL",type:"หุ้น",qty:10,avgCost:170.5,currentPrice:189.3,currency:"USD",sector:"Technology",note:"Long term",dateAdded:"2024-01-15"},
  {id:2,name:"Bitcoin",ticker:"BTC",type:"คริปโต",qty:0.5,avgCost:42000,currentPrice:67500,currency:"USD",sector:"Crypto",note:"DCA",dateAdded:"2024-02-01"},
  {id:3,name:"NVIDIA",ticker:"NVDA",type:"หุ้น",qty:5,avgCost:495,currentPrice:875,currency:"USD",sector:"Technology",note:"AI",dateAdded:"2024-01-20"},
  {id:4,name:"Ethereum",ticker:"ETH",type:"คริปโต",qty:3,avgCost:2100,currentPrice:3450,currency:"USD",sector:"Crypto",note:"",dateAdded:"2024-03-10"},
  {id:5,name:"PTTGC",ticker:"PTTGC",type:"หุ้น",qty:500,avgCost:38,currentPrice:32.5,currency:"THB",sector:"Energy",note:"Dividend",dateAdded:"2024-02-20"},
];
const calcPnl = a => { const cost=a.qty*a.avgCost,value=a.qty*a.currentPrice,pnlAmt=value-cost; return {cost,value,pnlAmt,pnlPct:cost>0?(pnlAmt/cost)*100:0}; };

// ── Price APIs ────────────────────────────────────────────────────────────────
const fetchPrices = async (assets) => {
  const result = {};
  const cryptos = assets.filter(a=>a.type==="คริปโต");
  const stocks  = assets.filter(a=>a.type!=="คริปโต");
  if (cryptos.length) {
    try {
      const ids = cryptos.map(a=>CRYPTO_MAP[a.ticker.toUpperCase()]||a.ticker.toLowerCase()).join(",");
      const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids="+ids+",tether&vs_currencies=usd,thb");
      const d = await r.json();
      cryptos.forEach(a=>{ const id=CRYPTO_MAP[a.ticker.toUpperCase()]||a.ticker.toLowerCase(); if(d[id]&&d[id].usd) result[a.ticker.toUpperCase()]=d[id].usd; });
      if (d.tether&&d.tether.thb) result._usdthb = d.tether.thb;
    } catch(e){ console.warn("CoinGecko:",e.message); }
  }
  await Promise.allSettled(stocks.map(async a=>{
    try {
      const t = a.currency==="THB"&&!a.ticker.includes(".")?a.ticker+".BK":a.ticker;
      const url = "https://api.allorigins.win/get?url="+encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+t+"?interval=1d&range=1d");
      const r = await fetch(url);
      const w = await r.json();
      const d = JSON.parse(w.contents);
      const p = d?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (p) result[a.ticker.toUpperCase()] = p;
    } catch(e){ console.warn("Yahoo",a.ticker,":",e.message); }
  }));
  return result;
};

// ── Sheets API ────────────────────────────────────────────────────────────────
const sheetsApi = async (url, token, action, body={}) => {
  const res = await fetch(url+"?action="+action+"&token="+encodeURIComponent(token), {
    method:"POST", headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({action, token, ...body}),
  });
  if (!res.ok) throw new Error("HTTP "+res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error||"Sheets error");
  return data;
};

// ── Small reusable components ─────────────────────────────────────────────────
const Sparkline = ({pos}) => {
  const pts = useMemo(()=>{ const a=[50]; for(let i=1;i<20;i++) a.push(Math.max(5,Math.min(95,a[i-1]+(Math.random()-(pos ? 0.35 : 0.65))*15))); return a; },[pos]);
  return <svg viewBox="0 0 100 100" width="70" height="28" preserveAspectRatio="none"><polyline points={pts.map((y,x)=>(x/19*100)+","+y).join(" ")} fill="none" stroke={pos?"#4ade80":"#f87171"} strokeWidth="2.5"/></svg>;
};

const Donut = ({data}) => {
  const total = data.reduce((s,d)=>s+d.value,0)||1;
  let off=0; const R=60,C=2*Math.PI*R;
  const COLS=["#60a5fa","#f59e0b","#34d399","#f472b6","#a78bfa","#fb923c"];
  const slices=data.map((d,i)=>{ const p=d.value/total,s={...d,dash:p*C,gap:C-p*C,off:off*C,col:COLS[i%6]}; off+=p; return s; });
  return <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
    <svg viewBox="0 0 160 160" width="150" height="150">
      <circle cx="80" cy="80" r={R} fill="none" stroke="#1e293b" strokeWidth="24"/>
      {slices.map((s,i)=><circle key={i} cx="80" cy="80" r={R} fill="none" stroke={s.col} strokeWidth="22" strokeDasharray={s.dash+" "+s.gap} strokeDashoffset={C/4-s.off}/>)}
      <text x="80" y="78" textAnchor="middle" fill="#e2e8f4" fontSize="10" fontWeight="700">Portfolio</text>
      <text x="80" y="92" textAnchor="middle" fill="#5a7a9a" fontSize="9">Allocation</text>
    </svg>
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {slices.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:7,fontSize:13}}>
        <span style={{width:9,height:9,borderRadius:"50%",background:s.col,flexShrink:0}}/>
        <span style={{flex:1}}>{s.label}</span>
        <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--muted)"}}>{((s.value/total)*100).toFixed(1)}%</span>
      </div>)}
    </div>
  </div>;
};

const BarChart = ({assets}) => {
  const data=[...assets].map(a=>({...a,...calcPnl(a)})).sort((a,b)=>b.pnlPct-a.pnlPct);
  const max=Math.max(...data.map(d=>Math.abs(d.pnlPct)),1);
  return <div style={{display:"flex",flexDirection:"column",gap:10}}>
    {data.map(d=><div key={d.id} style={{display:"grid",gridTemplateColumns:"55px 1fr 70px",alignItems:"center",gap:10}}>
      <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--muted)",textAlign:"right"}}>{d.ticker}</span>
      <div style={{height:8,background:"#1e2d4a",borderRadius:4,overflow:"hidden"}}>
        <div style={{width:(Math.abs(d.pnlPct)/max*100)+"%",height:"100%",borderRadius:4,background:d.pnlPct>=0?"#4ade80":"#f87171",transition:"width .6s"}}/>
      </div>
      <span style={{fontFamily:"var(--mono)",fontSize:12,fontWeight:600,textAlign:"right",color:d.pnlPct>0?"var(--positive)":d.pnlPct<0?"var(--negative)":"var(--muted)"}}>{pct(d.pnlPct)}</span>
    </div>)}
  </div>;
};

// ── Price Panel ───────────────────────────────────────────────────────────────
const PricePanel = ({onUpdate, status, lastUpdated, autoMin, setAutoMin}) => {
  const [cd, setCd] = useState(null);
  const ref = useRef(null);
  useEffect(()=>{
    clearInterval(ref.current);
    if(autoMin>0){ let s=autoMin*60; setCd(s); ref.current=setInterval(()=>{ s--; setCd(s); if(s<=0){onUpdate();s=autoMin*60;setCd(s); } },1000); }
    else setCd(null);
    return ()=>clearInterval(ref.current);
  },[autoMin]);
  const fcd = s=>{ if(!s) return ""; return Math.floor(s/60)+":"+(s%60<10?"0":"")+(s%60); };
  return <div className="panel">
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:6}}>
        {status==="loading"&&<span className="pill warn"><span className="spin-dot"/>กำลังดึงราคา</span>}
        {status==="done"   &&<span className="pill ok"><Icon d={I.check} size={12}/> อัพเดทแล้ว</span>}
        {status==="error"  &&<span className="pill err"><Icon d={I.alert} size={12}/> Error</span>}
        {status==="idle"   &&<span className="pill dim"><Icon d={I.clock} size={12}/> พร้อมอัพเดท</span>}
        <span style={{fontSize:11,color:"var(--muted)"}}>อัพเดทล่าสุด: {ago(lastUpdated)}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",fontSize:12,color:"var(--muted)"}}>
        <Icon d={I.bell} size={13}/> Auto:
        {[0,5,15,30,60].map(m=><button key={m} onClick={()=>setAutoMin(m)} style={{padding:"3px 9px",borderRadius:12,fontSize:11,fontWeight:600,cursor:"pointer",border:"1px solid",fontFamily:"inherit",borderColor:autoMin===m?"var(--accent)":"var(--border)",background:autoMin===m?"var(--accent)":"transparent",color:autoMin===m?"#fff":"var(--muted)"}}>{m===0?"ปิด":m+"m"}</button>)}
        {cd!==null&&<span style={{fontFamily:"var(--mono)",fontSize:12,color:"var(--accent2)",fontWeight:600}}>{fcd(cd)}</span>}
      </div>
    </div>
    <button onClick={onUpdate} disabled={status==="loading"} style={{display:"inline-flex",alignItems:"center",gap:7,background:"linear-gradient(135deg,#3b82f6,#6366f1)",color:"#fff",border:"none",padding:"9px 18px",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",opacity:status==="loading"?0.6:1}}>
      <Icon d={I.refresh} size={15}/> {status==="loading"?"กำลังดึง...":"อัพเดทราคา"}
    </button>
  </div>;
};

// ── Sync Bar ──────────────────────────────────────────────────────────────────
const SyncBar = ({connected, status, msg, lastSync, onSave, onLoad, onSync, onSetup}) => (
  <div className="panel" style={{marginBottom:14}}>
    <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",flex:1}}>
      <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:600}}>
        <span style={{fontSize:10,color:connected?"var(--positive)":"var(--muted)"}}>●</span>
        <span style={{color:connected?"var(--text)":"var(--muted)"}}>{connected?"Google Sheets":"ยังไม่เชื่อมต่อ"}</span>
      </div>
      {status!=="idle"&&<span style={{fontSize:12,color:status==="loading"?"var(--warning)":status==="done"?"var(--positive)":"var(--negative)"}}>{msg}</span>}
      {status==="idle"&&connected&&<span style={{fontSize:11,color:"var(--muted)"}}>Last sync: {ago(lastSync)}</span>}
    </div>
    <div style={{display:"flex",gap:6,flexShrink:0}}>
      {connected&&<>
        <button onClick={onSync} disabled={status==="loading"} className="btn-sm-blue">⇄ Sync</button>
        <button onClick={onSave} disabled={status==="loading"} className="btn-sm">↑ Save</button>
        <button onClick={onLoad} disabled={status==="loading"} className="btn-sm">↓ Load</button>
      </>}
      <button onClick={onSetup} className="btn-sm">{connected?"⚙️":"🔗 เชื่อม Sheets"}</button>
    </div>
  </div>
);

// ── DCA Calculator ────────────────────────────────────────────────────────────
const DCACalc = ({asset, usdThb}) => {
  const [amt,setAmt]=useState("100"); const [months,setMonths]=useState("12");
  const [freq,setFreq]=useState("monthly"); const [retPct,setRetPct]=useState("10");
  if(!asset) return null;
  const IS = {width:"100%",background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"8px 10px",borderRadius:7,fontSize:13,fontFamily:"inherit",outline:"none"};
  const be = asset.avgCost;
  const toBreakEven = ((be-asset.currentPrice)/asset.currentPrice)*100;
  const a=parseFloat(amt)||0, m=parseInt(months)||0, r=(parseFloat(retPct)||0)/100/12;
  const periods = m*(freq==="daily"?30:freq==="weekly"?4.33:1);
  const perPeriod = a/(freq==="daily"?30:freq==="weekly"?4.33:1);
  const fv = r>0 ? perPeriod*((Math.pow(1+r,periods)-1)/r) : perPeriod*periods;
  const newQty = a*m/asset.currentPrice;
  const newCost = (asset.qty*asset.avgCost+a*m)/(asset.qty+newQty);
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
    <div className="card">
      <div className="card-title"><Icon d={I.trend} size={13}/> Break-even</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {[["ต้นทุนเฉลี่ย","$"+fmt(asset.avgCost),"var(--warning)"],["ราคาปัจจุบัน","$"+fmt(asset.currentPrice),null],["ต้องขึ้น/ลง",pct(toBreakEven),toBreakEven>0?"var(--positive)":"var(--negative)"]].map(([l,v,c])=><div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
          <span style={{color:"var(--muted)"}}>{l}</span><span style={{fontFamily:"var(--mono)",fontWeight:600,color:c||"var(--text)"}}>{v}</span>
        </div>)}
        <div style={{background:"var(--border)",borderRadius:6,height:8,overflow:"hidden",marginTop:4}}>
          <div style={{width:Math.min(100,asset.currentPrice/asset.avgCost*100)+"%",height:"100%",borderRadius:6,background:asset.currentPrice>=asset.avgCost?"var(--positive)":"linear-gradient(90deg,#f87171,#fbbf24)"}}/>
        </div>
        <div style={{background:"rgba(59,130,246,.07)",padding:"8px 12px",borderRadius:8,fontSize:12,color:"var(--muted)"}}>
          มูลค่า (THB): <strong style={{color:"var(--text)"}}>฿{fmt(asset.qty*asset.currentPrice*usdThb,0)}</strong>
        </div>
      </div>
    </div>
    <div className="card">
      <div className="card-title"><Icon d={I.calc} size={13}/> DCA Calculator</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {[["ซื้อต่อเดือน (USD)",amt,setAmt,"number"],["นานกี่เดือน",months,setMonths,"number"],["% return/ปี (คาด)",retPct,setRetPct,"number"]].map(([l,v,s,t])=><div key={l}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:4}}>{l}</div>
          <input type={t} value={v} onChange={e=>s(e.target.value)} style={IS}/>
        </div>)}
        <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:4}}>ความถี่</div>
        <select value={freq} onChange={e=>setFreq(e.target.value)} style={IS}>
          <option value="daily">ทุกวัน</option><option value="weekly">ทุกสัปดาห์</option><option value="monthly">ทุกเดือน</option>
        </select>
        {a>0&&m>0&&<div style={{marginTop:6,borderTop:"1px solid var(--border)",paddingTop:10,display:"flex",flexDirection:"column",gap:6}}>
          {[["ลงทุนเพิ่ม","$"+fmt(a*m),null],["ต้นทุนเฉลี่ยใหม่","$"+fmt(newCost),"var(--warning)"],["มูลค่าคาด","$"+fmt(fv+asset.qty*asset.currentPrice),"var(--positive)"]].map(([l,v,c])=><div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
            <span style={{color:"var(--muted)"}}>{l}</span><span style={{fontFamily:"var(--mono)",fontWeight:700,color:c||"var(--text)"}}>{v}</span>
          </div>)}
        </div>}
      </div>
    </div>
  </div>;
};

// ── Cost vs Market Chart ───────────────────────────────────────────────────────
const CostChart = ({asset}) => {
  const lots = (asset?.dcaLots||[]).filter(l=>l.qty&&l.price).sort((a,b)=>a.date.localeCompare(b.date));
  if(lots.length<2) return <div className="card"><div className="card-title"><Icon d={I.act} size={13}/> Cost vs Market Timeline</div><div style={{textAlign:"center",padding:"32px 0",color:"var(--muted)",fontSize:13}}>ต้องการ DCA lots ≥ 2 รายการ</div></div>;
  let rq=0,rc=0;
  const pts = lots.map(l=>{ rq+=parseFloat(l.qty); rc+=parseFloat(l.qty)*parseFloat(l.price); return {date:l.date,buy:parseFloat(l.price),avg:rc/rq,qty:parseFloat(l.qty)}; });
  const W=800,H=240,PL=55,PR=10,PT=10,PB=32,cW=W-PL-PR,cH=H-PT-PB;
  const allP=[...pts.flatMap(p=>[p.buy,p.avg]),asset.currentPrice];
  const minY=Math.min(...allP)*0.94,maxY=Math.max(...allP)*1.06;
  const minTs=new Date(pts[0].date).getTime(),maxTs=Date.now();
  const xP=d=>PL+((new Date(d).getTime()-minTs)/(maxTs-minTs||1))*cW;
  const yP=v=>PT+(1-(v-minY)/(maxY-minY||1))*cH;
  const avgPath=pts.map((p,i)=>(i===0?"M":"L")+xP(p.date).toFixed(1)+","+yP(p.avg).toFixed(1)).join(" ");
  const cpY=yP(asset.currentPrice).toFixed(1);
  const rng=maxY-minY; const step=rng>50000?10000:rng>10000?5000:rng>1000?500:50;
  const yTicks=[]; for(let v=Math.ceil(minY/step)*step;v<=maxY;v+=step) yTicks.push({v,y:yP(v)});
  const maxQty=Math.max(...pts.map(p=>p.qty));
  return <div className="card">
    <div className="card-title" style={{marginBottom:8}}><Icon d={I.act} size={13}/> Cost vs Market Timeline — {asset.ticker}</div>
    <div style={{display:"flex",gap:14,marginBottom:10,flexWrap:"wrap"}}>
      {[["─ ต้นทุนเฉลี่ย","#fbbf24"],["⬤ ราคาซื้อ (น้ำเงิน=ดีกว่าค่าเฉลี่ย)","#60a5fa"],["- - ราคาปัจจุบัน","#4ade80"]].map(([l,c])=><div key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--muted)"}}><span style={{color:c}}>{l.split(" ")[0]}</span> {l.split(" ").slice(1).join(" ")}</div>)}
    </div>
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
      <defs><clipPath id="cc"><rect x={PL} y={PT} width={cW} height={cH}/></clipPath></defs>
      {yTicks.map((t,i)=><g key={i}><line x1={PL} y1={t.y} x2={PL+cW} y2={t.y} stroke="#1e2d4a" strokeWidth="1"/><text x={PL-5} y={t.y+4} textAnchor="end" fill="#5a7a9a" fontSize="9">{t.v>=1000?(t.v/1000).toFixed(0)+"k":t.v}</text></g>)}
      <line x1={PL} y1={cpY} x2={PL+cW} y2={cpY} stroke="#4ade80" strokeWidth="1.5" strokeDasharray="5,3" clipPath="url(#cc)"/>
      <text x={PL+cW-2} y={parseFloat(cpY)-4} textAnchor="end" fill="#4ade80" fontSize="9" fontWeight="700">${fmt(asset.currentPrice)}</text>
      <path d={avgPath} fill="none" stroke="#fbbf24" strokeWidth="2" clipPath="url(#cc)"/>
      {pts.map((p,i)=><circle key={i} cx={xP(p.date)} cy={yP(p.buy)} r={3+(p.qty/maxQty)*5} fill={p.buy>p.avg?"rgba(248,113,113,.75)":"rgba(96,165,250,.75)"} stroke={p.buy>p.avg?"#f87171":"#60a5fa"} strokeWidth="1.5" clipPath="url(#cc)"/>)}
    </svg>
  </div>;
};

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const SK = "portfolioTH_v4";

  // ── State (all before useEffect) ──────────────────────────────────────────
  const [assets,       setAssets]       = useState(()=>ls.get(SK+".assets", SAMPLE));
  const [tab,          setTab]          = useState("dashboard");
  const [darkMode,     setDarkMode]     = useState(()=>localStorage.getItem("theme")==="light"?false:true);
  const [usdThb,       setUsdThb]       = useState(()=>parseFloat(localStorage.getItem("usdThb"))||35.5);
  const [goals,        setGoals]        = useState(()=>ls.get("goals", []));
  const [priceStatus,  setPriceStatus]  = useState("idle");
  const [priceError,   setPriceError]   = useState("");
  const [lastUpdated,  setLastUpdated]  = useState(()=>localStorage.getItem("lastUpdated")||null);
  const [priceLog,     setPriceLog]     = useState(()=>ls.get("priceLog", []));
  const [autoMin,      setAutoMin]      = useState(0);
  const [filterType,   setFilterType]   = useState("ทั้งหมด");
  const [sortKey,      setSortKey]      = useState("value");
  const [saved,        setSaved]        = useState(false);
  const [showAdd,      setShowAdd]      = useState(false);
  const [editAsset,    setEditAsset]    = useState(null);
  const [showBackup,   setShowBackup]   = useState(false);
  const [showLog,      setShowLog]      = useState(false);
  const [confirmDel,   setConfirmDel]   = useState(null);
  const [sheetUrl,     setSheetUrl]     = useState(()=>localStorage.getItem("gsheet_url")||"");
  const [sheetToken,   setSheetToken]   = useState(()=>localStorage.getItem("gsheet_token")||"");
  const [syncStatus,   setSyncStatus]   = useState("idle");
  const [syncMsg,      setSyncMsg]      = useState("");
  const [showSheets,   setShowSheets]   = useState(false);
  const [activeAsset,  setActiveAsset]  = useState(null);

  // ── Effects ───────────────────────────────────────────────────────────────
  useEffect(()=>{ document.documentElement.setAttribute("data-theme",darkMode?"dark":"light"); localStorage.setItem("theme",darkMode?"dark":"light"); },[darkMode]);
  useEffect(()=>{ ls.set(SK+".assets",assets); setSaved(true); setTimeout(()=>setSaved(false),1500); },[assets]);
  useEffect(()=>{ ls.set("goals",goals); },[goals]);
  useEffect(()=>{ if(assets.length>0&&!activeAsset) setActiveAsset(assets[0].id); },[assets]);

  // ── Price update ──────────────────────────────────────────────────────────
  const updatePrices = useCallback(async()=>{
    if(!assets.length) return;
    setPriceStatus("loading"); setPriceError("");
    fetch("https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=thb").then(r=>r.json()).then(d=>{ if(d&&d.tether&&d.tether.thb){const v=parseFloat(d.tether.thb);setUsdThb(v);localStorage.setItem("usdThb",String(v));} }).catch(()=>{});
    try {
      const prices = await fetchPrices(assets);
      const now = new Date().toISOString();
      if (prices._usdthb) { setUsdThb(prices._usdthb); localStorage.setItem("usdThb",String(prices._usdthb)); }
      setAssets(prev=>prev.map(a=>{ const p=prices[a.ticker.toUpperCase()]; return p?{...a,currentPrice:p}:a; }));
      setLastUpdated(now); localStorage.setItem("lastUpdated",now);
      setPriceLog(prev=>[...prev.slice(-19),{time:now,prices}]);
      ls.set("priceLog",[...priceLog.slice(-19),{time:now,prices}]);
      setPriceStatus("done"); setTimeout(()=>setPriceStatus("idle"),3000);
    } catch(e){ setPriceError(e.message); setPriceStatus("error"); setTimeout(()=>setPriceStatus("idle"),5000); }
  },[assets]);

  // ── Asset CRUD ────────────────────────────────────────────────────────────
  const saveAsset = d => {
    const now = new Date().toISOString();
    if (editAsset) setAssets(a=>a.map(x=>x.id===editAsset.id?{...d,id:editAsset.id,syncedAt:now}:x));
    else setAssets(a=>[...a,{...d,id:Date.now(),syncedAt:now}]);
    setShowAdd(false); setEditAsset(null);
  };

  // ── Goals CRUD ────────────────────────────────────────────────────────────
  const saveGoal = g => { const updated=g.id?goals.map(x=>x.id===g.id?g:x):[...goals,{...g,id:Date.now()}]; setGoals(updated); };
  const deleteGoal = id => setGoals(g=>g.filter(x=>x.id!==id));

  // ── CSV Export ────────────────────────────────────────────────────────────
  const exportCSV = () => {
    const rows = [["Date","Ticker","Name","Type","Qty","AvgCost","CurrentPrice","Currency","CostBasis","Value","PnL","PnL%","Sector","Note"]];
    withPnl.forEach(a=>rows.push([a.dateAdded||"",a.ticker,a.name,a.type,a.qty,a.avgCost,a.currentPrice,a.currency,a.cost.toFixed(2),a.value.toFixed(2),a.pnlAmt.toFixed(2),a.pnlPct.toFixed(2),a.sector||"",a.note||""]));
    withPnl.forEach(a=>(a.dcaLots||[]).forEach(l=>rows.push([l.date,a.ticker,"[DCA lot]","","",l.price,l.qty,"","","","","","",""])));
    const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(",")).join("\n");
    const uri = "data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    const a=document.createElement("a"); a.href=uri; a.download="portfolio_"+new Date().toISOString().slice(0,10)+".csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  // ── Google Sheets Sync ────────────────────────────────────────────────────
  const sheetCall = async (action, body={}) => {
    if(!sheetUrl||!sheetToken) throw new Error("ยังไม่ได้ตั้งค่า Google Sheets");
    return sheetsApi(sheetUrl, sheetToken, action, body);
  };
  const doSync = async (action) => {
    setSyncStatus("loading"); setSyncMsg(action==="save"?"กำลัง Save...":action==="load"?"กำลัง Load...":"กำลัง Sync...");
    try {
      const now = new Date().toISOString();
      const tagged = assets.map(a=>({...a,syncedAt:a.syncedAt||now}));
      const res = await sheetCall(action, action!=="load"?{assets:tagged}:{});
      if (action!=="save"&&res.assets) setAssets(res.assets);
      setSyncStatus("done"); const label=action==="save"?"Save":action==="load"?"Load":"Sync"; setSyncMsg("✅ "+label+" สำเร็จ • "+new Date().toLocaleTimeString("th-TH"));
      localStorage.setItem("gsheet_lastSync",now);
      setTimeout(()=>setSyncStatus("idle"),4000);
    } catch(e){ setSyncStatus("error"); setSyncMsg("❌ "+e.message); setTimeout(()=>setSyncStatus("idle"),6000); }
  };

  // ── Derived data ──────────────────────────────────────────────────────────
  const withPnl = useMemo(()=>assets.map(a=>({...a,...calcPnl(a)})),[assets]);
  const filtered = useMemo(()=>{
    let r=filterType==="ทั้งหมด"?withPnl:withPnl.filter(a=>a.type===filterType);
    return [...r].sort((a,b)=>sortKey==="value"?b.value-a.value:sortKey==="pnlPct"?b.pnlPct-a.pnlPct:sortKey==="pnlAmt"?b.pnlAmt-a.pnlAmt:a.name.localeCompare(b.name));
  },[withPnl,filterType,sortKey]);
  const sum = useMemo(()=>{
    const tc=withPnl.reduce((s,a)=>s+a.cost,0),tv=withPnl.reduce((s,a)=>s+a.value,0),tp=tv-tc;
    return {tc,tv,tp,pct:tc>0?(tp/tc)*100:0,wins:withPnl.filter(a=>a.pnlAmt>0).length,loses:withPnl.filter(a=>a.pnlAmt<0).length};
  },[withPnl]);
  const alloc = useMemo(()=>{ const g={}; withPnl.forEach(a=>{g[a.type]=(g[a.type]||0)+a.value;}); return Object.entries(g).map(([label,value])=>({label,value})); },[withPnl]);
  const topG = useMemo(()=>[...withPnl].sort((a,b)=>b.pnlPct-a.pnlPct)[0],[withPnl]);
  const topL = useMemo(()=>[...withPnl].sort((a,b)=>a.pnlPct-b.pnlPct)[0],[withPnl]);
  const selAsset = assets.find(a=>a.id===activeAsset)||assets[0];

  // ── Render ────────────────────────────────────────────────────────────────
  return <>

      <PricePanel onUpdate={updatePrices} status={priceStatus} lastUpdated={lastUpdated} autoMin={autoMin} setAutoMin={setAutoMin}/>
      <SyncBar connected={!!sheetUrl} status={syncStatus} msg={syncMsg} lastSync={localStorage.getItem("gsheet_lastSync")} onSave={()=>doSync("save")} onLoad={()=>doSync("load")} onSync={()=>doSync("sync")} onSetup={()=>setShowSheets(true)}/>
      {priceError&&priceStatus==="error"&&<div style={{background:"rgba(248,113,113,.1)",border:"1px solid rgba(248,113,113,.25)",borderRadius:10,padding:"9px 14px",fontSize:12,color:"var(--negative)",marginBottom:14}}>⚠️ {priceError}</div>}

      {/* ── DASHBOARD ── */}
      {tab==="dashboard"&&<>
        <div className="stats">
          <div className="stat-card"><div className="stat-label">มูลค่าพอร์ตรวม</div><div className="stat-val">{fmtUSD(sum.tv)}</div><div className="stat-sub">≈ ฿{fmt(sum.tv*usdThb,0)} • {assets.length} สินทรัพย์</div></div>
          <div className="stat-card"><div className="stat-label">กำไร/ขาดทุน</div><div className={"stat-val "+pc(sum.tp)}>{fmtUSD(sum.tp)}</div><div className={"stat-sub "+pc(sum.pct)}>{pct(sum.pct)} จากต้นทุน</div></div>
          <div className="stat-card"><div className="stat-label">ต้นทุนรวม</div><div className="stat-val">{fmtUSD(sum.tc)}</div><div className="stat-sub">Cost Basis</div></div>
          <div className="stat-card"><div className="stat-label">Win / Loss</div><div className="stat-val"><span className="positive">{sum.wins}</span> <span style={{color:"var(--border)"}}>|</span> <span className="negative">{sum.loses}</span></div><div className="stat-sub">กำไร | ขาดทุน</div></div>
        </div>
        <div className="hl-grid">
          {topG&&<div className="hl-card"><div style={{width:38,height:38,borderRadius:10,background:"rgba(74,222,128,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🏆</div><div><div style={{fontSize:11,color:"var(--muted)"}}>Best Performer</div><div style={{fontWeight:700}}>{topG.name}</div><div style={{fontFamily:"var(--mono)",fontSize:13,color:"var(--positive)"}}>{pct(topG.pnlPct)}</div></div><div style={{marginLeft:"auto"}}><Sparkline pos={true}/></div></div>}
          {topL&&<div className="hl-card"><div style={{width:38,height:38,borderRadius:10,background:"rgba(248,113,113,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>📉</div><div><div style={{fontSize:11,color:"var(--muted)"}}>Worst Performer</div><div style={{fontWeight:700}}>{topL.name}</div><div style={{fontFamily:"var(--mono)",fontSize:13,color:"var(--negative)"}}>{pct(topL.pnlPct)}</div></div><div style={{marginLeft:"auto"}}><Sparkline pos={false}/></div></div>}
        </div>
        <div className="dash-grid">
          <div className="card"><div className="card-title"><Icon d={I.chart} size={12}/> P&L by Asset</div><BarChart assets={assets}/></div>
          <div className="card"><div className="card-title"><Icon d={I.pie} size={12}/> Allocation</div>{alloc.length>0&&<Donut data={alloc}/>}</div>
        </div>
      </>}

      {/* ── PORTFOLIO ── */}
      {tab==="portfolio"&&<div className="card">
        <div className="toolbar">
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{["ทั้งหมด",...TYPES].map(t=><button key={t} className={"chip"+(filterType===t?" on":"")} onClick={()=>setFilterType(t)}>{t}</button>)}</div>
          <select value={sortKey} onChange={e=>setSortKey(e.target.value)} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"5px 28px 5px 10px",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"inherit",marginLeft:"auto"}}>
            <option value="value">มูลค่า</option><option value="pnlPct">%P&L</option><option value="pnlAmt">P&L</option><option value="name">ชื่อ</option>
          </select>
        </div>
        {filtered.length===0?<div className="empty"><h3>ยังไม่มีสินทรัพย์</h3></div>:
        <div className="table-wrap"><table>
          <thead><tr><th>สินทรัพย์</th><th>ประเภท</th><th>จำนวน</th><th>ราคา</th><th>มูลค่า</th><th>P&L</th><th>%P&L</th><th>หมายเหตุ</th><th/><tr></thead>
          <tbody>{filtered.map(a=>{
            const DOT_COLOR={หุ้น:"#60a5fa",คริปโต:"#f59e0b",ETF:"#34d399",กองทุน:"#f472b6"}[a.type]||"#a78bfa";
            return <tr key={a.id}>
              <td><div style={{display:"flex",alignItems:"center",gap:7}}><span style={{width:7,height:7,borderRadius:"50%",background:DOT_COLOR,flexShrink:0}}/><div><div style={{fontWeight:700,fontSize:13}}>{a.ticker}{a.dcaLots?.length>1&&<span className="dca-badge">DCA {a.dcaLots.length}x</span>}</div><div style={{fontSize:11,color:"var(--muted)"}}>{a.name}</div><div className="pm">{fmt(a.currentPrice)} {a.currency}</div></div></div></td>
              <td><span style={{fontSize:12,color:"var(--muted)"}}>{a.type}</span></td>
              <td><span className="mono">{fmt(a.qty,a.qty%1===0?0:4)}</span></td>
              <td><span className="mono">{fmt(a.currentPrice)} <span style={{fontSize:10,color:"var(--muted)"}}>{a.currency}</span></span></td>
              <td><span className="mono" style={{fontWeight:600}}>{fmt(a.value)}</span></td>
              <td><span className={"mono "+pc(a.pnlAmt)}>{a.pnlAmt>=0?"+":""}{fmt(a.pnlAmt)}</span></td>
              <td><span className={"mono "+pc(a.pnlPct)} style={{fontWeight:700}}>{pct(a.pnlPct)}</span></td>
              <td><span style={{fontSize:11,color:"var(--muted)",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block"}}>{a.note||"—"}</span></td>
              <td><div style={{display:"flex",gap:3}}><button className="icon-btn" onClick={()=>{setEditAsset(a);setShowAdd(true);}}><Icon d={I.edit} size={14}/></button><button className="icon-btn" style={{color:"var(--negative)"}} onClick={()=>setConfirmDel({id:a.id,name:a.name||a.ticker})}><Icon d={I.trash} size={14}/></button></div></td>
            </tr>;
          })}</tbody>
        </table></div>}
      </div>}

      {/* ── ANALYSIS ── */}
      {tab==="analysis"&&<>
        <div className="stats">
          {TYPES.map(type=>{ const its=withPnl.filter(a=>a.type===type); if(!its.length) return null; const tv=its.reduce((s,a)=>s+a.value,0),tc=its.reduce((s,a)=>s+a.cost,0),tp=tv-tc,pp=tc>0?(tp/tc)*100:0; return <div key={type} className="stat-card"><div className="stat-label">{type}</div><div className="stat-val">{fmt(tv)}</div><div className={"stat-sub "+pc(pp)}>{pct(pp)} • {its.length} รายการ</div></div>; })}
        </div>
        <div className="card">
          <div className="card-title"><Icon d={I.trend} size={12}/> Sector Breakdown</div>
          <div className="table-wrap"><table>
            <thead><tr><th>Sector</th><th>Tickers</th><th>มูลค่า</th><th>ต้นทุน</th><th>P&L</th><th>%P&L</th></tr></thead>
            <tbody>{(()=>{ const sg={}; withPnl.forEach(a=>{const k=a.sector||"Other";if(!sg[k])sg[k]=[];sg[k].push(a);}); return Object.entries(sg).map(([s,its])=>{ const v=its.reduce((x,a)=>x+a.value,0),c=its.reduce((x,a)=>x+a.cost,0),pa=v-c,pp=c>0?(pa/c)*100:0; return <tr key={s}><td style={{fontWeight:600}}>{s}</td><td><span className="mono">{its.map(a=>a.ticker).join(", ")}</span></td><td><span className="mono">{fmt(v)}</span></td><td><span className="mono">{fmt(c)}</span></td><td><span className={"mono "+pc(pa)}>{pa>=0?"+":""}{fmt(pa)}</span></td><td><span className={"mono "+pc(pp)} style={{fontWeight:700}}>{pct(pp)}</span></td></tr>; }); })()}</tbody>
          </table></div>
        </div>
      </>}

      {/* ── TOOLS ── */}
      {tab==="tools"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div className="card">
          <div className="card-title"><Icon d={I.calc} size={12}/> เลือกสินทรัพย์</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {assets.map(a=><button key={a.id} className={"chip"+(activeAsset===a.id?" on":"")} onClick={()=>setActiveAsset(a.id)}>{a.ticker}</button>)}
          </div>
        </div>
        {selAsset&&<DCACalc asset={selAsset} usdThb={usdThb}/>}
        {selAsset&&<CostChart asset={selAsset}/>}
      </div>}

      {/* ── GOALS ── */}
      {tab==="goals"&&<GoalsTab assets={assets} goals={goals} saveGoal={saveGoal} deleteGoal={deleteGoal} usdThb={usdThb}/>}
    </main>
  </div>

  {/* Modals */}
  {(showAdd||editAsset)&&<AssetModal asset={editAsset} onSave={saveAsset} onClose={()=>{setShowAdd(false);setEditAsset(null);}}/>}
  {showBackup&&<BackupModal assets={assets} onClose={()=>setShowBackup(false)} onRestore={d=>{setAssets(d);setShowBackup(false);}}/>}
  {showLog&&<LogModal log={priceLog} onClose={()=>setShowLog(false)}/>}
  {showSheets&&<SheetsModal initUrl={sheetUrl} initToken={sheetToken} onClose={()=>setShowSheets(false)} onSave={(url,tok)=>{setSheetUrl(url);setSheetToken(tok);localStorage.setItem("gsheet_url",url);localStorage.setItem("gsheet_token",tok);setShowSheets(false);setSyncMsg("✅ เชื่อมต่อสำเร็จ!");setSyncStatus("done");setTimeout(()=>setSyncStatus("idle"),3000);}}/>}
  {confirmDel&&<ConfirmModal name={confirmDel.name} onConfirm={()=>{setAssets(a=>a.filter(x=>x.id!==confirmDel.id));setConfirmDel(null);}} onClose={()=>setConfirmDel(null)}/>}
  </>;
}

// เปลี่ยนมาใช้ ReactDOM.render (รองรับ React 18 UMD + Babel in-browser ได้ดีกว่า)
ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
