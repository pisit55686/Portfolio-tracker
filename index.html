const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─── Icons ─────────────────────────────────────────────────────────────────

};

// ─── Helpers ────────────────────────────────────────────────────────────────
const fmt = (n, decimals = 2) => n == null || isNaN(n) ? "—" : Number(n).toLocaleString("th-TH", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
const fmtCurrency = (n) => n == null || isNaN(n) ? "—" : (n >= 0 ? "" : "-") + "$" + Math.abs(Number(n)).toLocaleString("th-TH", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const pct = (n) => n == null || isNaN(n) ? "—" : `${n >= 0 ? "+" : ""}${Number(n).toFixed(2)}%`;
const pnlColor = (n) => n > 0 ? "positive" : n < 0 ? "negative" : "neutral";
const timeAgo = (iso) => {
  if (!iso) return "ไม่เคย";
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return new Date(iso).toLocaleDateString("th-TH");
};

const ASSET_TYPES = ["หุ้น","คริปโต","ETF","กองทุน","อื่นๆ"];
const CURRENCIES = ["USD","THB","BTC","ETH"];
const SAMPLE_DATA = [
  { id:1, name:"Apple Inc.", ticker:"AAPL", type:"หุ้น", qty:10, avgCost:170.5, currentPrice:189.3, currency:"USD", sector:"Technology", note:"Long term hold", dateAdded:"2024-01-15" },
  { id:2, name:"Bitcoin", ticker:"BTC", type:"คริปโต", qty:0.5, avgCost:42000, currentPrice:67500, currency:"USD", sector:"Crypto", note:"DCA strategy", dateAdded:"2024-02-01" },
  { id:3, name:"NVIDIA Corp.", ticker:"NVDA", type:"หุ้น", qty:5, avgCost:495, currentPrice:875.4, currency:"USD", sector:"Technology", note:"AI play", dateAdded:"2024-01-20" },
  { id:4, name:"Ethereum", ticker:"ETH", type:"คริปโต", qty:3, avgCost:2100, currentPrice:3450, currency:"USD", sector:"Crypto", note:"", dateAdded:"2024-03-10" },
  { id:5, name:"PTT Global Chemical", ticker:"PTTGC", type:"หุ้น", qty:500, avgCost:38, currentPrice:32.5, currency:"THB", sector:"Energy", note:"Dividend stock", dateAdded:"2024-02-20" },
];
const calcPnl = (a) => {
  const cost = a.qty * a.avgCost, value = a.qty * a.currentPrice, pnlAmt = value - cost;
  return { cost, value, pnlAmt, pnlPct: cost > 0 ? (pnlAmt / cost) * 100 : 0 };
};

// ─── Free Price APIs ─────────────────────────────────────────────────────────
const CRYPTO_IDS = {
  BTC:"bitcoin",ETH:"ethereum",BNB:"binancecoin",SOL:"solana",ADA:"cardano",
  XRP:"ripple",DOT:"polkadot",DOGE:"dogecoin",AVAX:"avalanche-2",
  MATIC:"matic-network",LINK:"chainlink",UNI:"uniswap",ATOM:"cosmos",
  LTC:"litecoin",BCH:"bitcoin-cash",
};

const fetchCryptoPrices = async (tickers) => {
  if (!tickers.length) return {};
  const ids = tickers.map(t => CRYPTO_IDS[t.toUpperCase()] || t.toLowerCase()).join(",");
  const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
  if (!res.ok) throw new Error("CoinGecko error");
  const data = await res.json();
  const result = {};
  tickers.forEach(t => {
    const id = CRYPTO_IDS[t.toUpperCase()] || t.toLowerCase();
    if (data[id]?.usd) result[t.toUpperCase()] = data[id].usd;
  });
  return result;
};

const fetchStockPrice = async (ticker, currency) => {
  const yTicker = currency === "THB" && !ticker.includes(".") ? ticker + ".BK" : ticker;
  const url = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${yTicker}?interval=1d&range=1d`)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Yahoo error for ${ticker}`);
  const wrapper = await res.json();
  const data = JSON.parse(wrapper.contents);
  const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
  if (!price) throw new Error(`No price for ${ticker}`);
  return price;
};

const fetchPrices = async (assets) => {
  const results = {};
  const cryptoAssets = assets.filter(a => a.type === "คริปโต");
  const stockAssets = assets.filter(a => a.type !== "คริปโต");
  if (cryptoAssets.length) {
    try {
      const cp = await fetchCryptoPrices(cryptoAssets.map(a => a.ticker));
      Object.assign(results, cp);
    } catch(e) { console.warn("CoinGecko:", e.message); }
  }
  await Promise.allSettled(stockAssets.map(async (a) => {
    try {
      const price = await fetchStockPrice(a.ticker, a.currency);
      results[a.ticker.toUpperCase()] = price;
    } catch(e) { console.warn(`Stock ${a.ticker}:`, e.message); }
  }));
  return results;
};

// ─── Sparkline ───────────────────────────────────────────────────────────────
const Sparkline = ({ positive }) => {
  const points = useMemo(() => {
    const arr = [50];
    for (let i = 1; i < 20; i++) arr.push(Math.max(5, Math.min(95, arr[i-1] + (Math.random() - (positive ? 0.35 : 0.65)) * 15)));
    return arr;
  }, [positive]);
  const pts = points.map((y, x) => `${(x/19)*100},${y}`).join(" ");
  return <svg viewBox="0 0 100 100" width="70" height="28" preserveAspectRatio="none">
    <polyline points={pts} fill="none" stroke={positive ? "#4ade80" : "#f87171"} strokeWidth="2.5"/>
  </svg>;
};

// ─── DonutChart ──────────────────────────────────────────────────────────────
const DonutChart = ({ data }) => {
  const total = data.reduce((s,d) => s+d.value, 0);
  let offset = 0;
  const R = 60, C = 2*Math.PI*R;
  const COLORS = ["#60a5fa","#f59e0b","#34d399","#f472b6","#a78bfa","#fb923c"];
  const slices = data.map((d,i) => {
    const p = d.value/total;
    const s = { ...d, dash:p*C, gap:C-p*C, offset:offset*C, color:COLORS[i%COLORS.length] };
    offset += p; return s;
  });
  return <div className="donut-wrap">
    <svg viewBox="0 0 160 160" width="160" height="160">
      <circle cx="80" cy="80" r={R} fill="none" stroke="#1e293b" strokeWidth="24"/>
      {slices.map((s,i) => <circle key={i} cx="80" cy="80" r={R} fill="none" stroke={s.color} strokeWidth="22"
        strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={C/4-s.offset}/>)}
      <text x="80" y="76" textAnchor="middle" fill="#f1f5f9" fontSize="11" fontWeight="700">Portfolio</text>
      <text x="80" y="92" textAnchor="middle" fill="#94a3b8" fontSize="9">Allocation</text>
    </svg>
    <div className="donut-legend">
      {slices.map((s,i) => <div key={i} className="legend-item">
        <span className="legend-dot" style={{background:s.color}}/>
        <span className="legend-label">{s.label}</span>
        <span className="legend-pct">{((s.value/total)*100).toFixed(1)}%</span>
      </div>)}
    </div>
  </div>;
};

// ─── BarChart ────────────────────────────────────────────────────────────────
const BarChart = ({ assets }) => {
  const data = assets.map(a => ({...a,...calcPnl(a)})).sort((a,b) => b.pnlPct-a.pnlPct);
  const max = Math.max(...data.map(d => Math.abs(d.pnlPct)), 1);
  return <div className="bar-chart">
    {data.map(d => <div key={d.id} className="bar-row">
      <span className="bar-ticker">{d.ticker}</span>
      <div className="bar-track"><div className="bar-fill" style={{width:`${(Math.abs(d.pnlPct)/max)*100}%`,background:d.pnlPct>=0?"#4ade80":"#f87171"}}/></div>
      <span className={`bar-val ${pnlColor(d.pnlPct)}`}>{pct(d.pnlPct)}</span>
    </div>)}
  </div>;
};

// ─── PricePanel ──────────────────────────────────────────────────────────────
const PricePanel = ({ assets, onUpdatePrices, priceStatus, lastUpdated, autoRefreshMin, setAutoRefreshMin }) => {
  const [countdown, setCountdown] = useState(null);
  const timerRef = useRef(null);
  useEffect(() => {
    clearInterval(timerRef.current);
    if (autoRefreshMin > 0) {
      let s = autoRefreshMin * 60; setCountdown(s);
      timerRef.current = setInterval(() => {
        s--; setCountdown(s);
        if (s <= 0) { onUpdatePrices(); s = autoRefreshMin * 60; setCountdown(s); }
      }, 1000);
    } else setCountdown(null);
    return () => clearInterval(timerRef.current);
  }, [autoRefreshMin]);
  const fmtCD = (s) => { if (!s) return ""; const m=Math.floor(s/60); return `${m}:${String(s%60).padStart(2,"0")}`; };
  return <div className="price-panel">
    <div className="price-panel-left">
      <div className="price-status-row">
        {priceStatus==="loading" && <span className="status-pill loading"><span className="pulse-dot"/> กำลังดึงราคา...</span>}
        {priceStatus==="done" && <span className="status-pill done"><Icon d={Icons.check} size={12}/> อัพเดทแล้ว</span>}
        {priceStatus==="error" && <span className="status-pill error"><Icon d={Icons.alert} size={12}/> Error</span>}
        {priceStatus==="idle" && <span className="status-pill idle"><Icon d={Icons.clock} size={12}/> พร้อมอัพเดท</span>}
        <span className="last-updated">อัพเดทล่าสุด: {timeAgo(lastUpdated)}</span>
      </div>
      <div className="auto-refresh-row">
        <Icon d={Icons.bell} size={13}/>
        <span>Auto-refresh:</span>
        {[0,5,15,30,60].map(m => <button key={m} className={`refresh-chip ${autoRefreshMin===m?"active":""}`} onClick={() => setAutoRefreshMin(m)}>
          {m===0?"ปิด":`${m}m`}
        </button>)}
        {countdown !== null && <span className="countdown">{fmtCD(countdown)}</span>}
      </div>
    </div>
    <button className="btn-update" onClick={onUpdatePrices} disabled={priceStatus==="loading"}>
      <Icon d={Icons.refresh} size={15} className={priceStatus==="loading"?"spin":""}/>
      {priceStatus==="loading" ? "กำลังดึง..." : "อัพเดทราคา"}
    </button>
  </div>;
};

// ─── DCA helper ──────────────────────────────────────────────────────────────
const calcDCA = (lots) => {
  const v = lots.filter(l => l.qty && l.price && !isNaN(l.qty) && !isNaN(l.price));
  if (!v.length) return { qty:0, avgCost:0 };
  const tq = v.reduce((s,l) => s+parseFloat(l.qty), 0);
  const tc = v.reduce((s,l) => s+parseFloat(l.qty)*parseFloat(l.price), 0);
  return { qty:tq, avgCost:tc/tq };
};

// ─── Modal ───────────────────────────────────────────────────────────────────
const EMPTY_LOT = () => ({ id: Date.now()+Math.random(), qty:"", price:"", date:new Date().toISOString().slice(0,10) });
const Modal = ({ asset, onSave, onClose }) => {
  const [inputMode, setInputMode] = useState(asset?.dcaLots?.length > 1 ? "dca" : "manual");
  const [info, setInfo] = useState({
    name:asset?.name||"", ticker:asset?.ticker||"", type:asset?.type||"หุ้น",
    currentPrice:asset?String(asset.currentPrice):"", currency:asset?.currency||"USD",
    sector:asset?.sector||"", note:asset?.note||"",
  });
  const [manualQty, setManualQty] = useState(asset?String(asset.qty):"");
  const [manualAvg, setManualAvg] = useState(asset?String(asset.avgCost):"");
  const [lots, setLots] = useState(asset?.dcaLots?.length ? asset.dcaLots.map(l=>({...l,id:l.id||Date.now()+Math.random()})) : [EMPTY_LOT(),EMPTY_LOT()]);
  const setInf = (k,v) => setInfo(f=>({...f,[k]:v}));
  const setLot = (id,k,v) => setLots(ls=>ls.map(l=>l.id===id?{...l,[k]:v}:l));
  const dcaR = calcDCA(lots);
  const qty = inputMode==="dca" ? dcaR.qty : parseFloat(manualQty)||0;
  const avgCost = inputMode==="dca" ? dcaR.avgCost : parseFloat(manualAvg)||0;
  const canSave = info.name && info.ticker && info.currentPrice && qty>0 && avgCost>0;
  const handleSave = () => {
    if (!canSave) return;
    onSave({ ...info, qty, avgCost, currentPrice:parseFloat(info.currentPrice),
      dcaLots: inputMode==="dca" ? lots.filter(l=>l.qty&&l.price) : null,
      dateAdded: asset?.dateAdded || new Date().toISOString().slice(0,10) });
  };
  const inputStyle = {background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"8px 10px",borderRadius:7,fontSize:13,fontFamily:"inherit",outline:"none",width:"100%"};
  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-header">
        <span>{asset?"แก้ไขสินทรัพย์":"เพิ่มสินทรัพย์ใหม่"}</span>
        <button className="icon-btn" onClick={onClose}><Icon d={Icons.x}/></button>
      </div>
      <div className="modal-body">
        <div className="form-grid" style={{marginBottom:16}}>
          <div className="form-field"><label>ชื่อสินทรัพย์</label><input value={info.name} onChange={e=>setInf("name",e.target.value)} placeholder="Apple Inc." style={inputStyle}/></div>
          <div className="form-field"><label>Ticker</label><input value={info.ticker} onChange={e=>setInf("ticker",e.target.value.toUpperCase())} placeholder="AAPL" style={inputStyle}/></div>
          <div className="form-field"><label>ประเภท</label>
            <select value={info.type} onChange={e=>setInf("type",e.target.value)} style={inputStyle}>
              {ASSET_TYPES.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div className="form-field"><label>สกุลเงิน</label>
            <select value={info.currency} onChange={e=>setInf("currency",e.target.value)} style={inputStyle}>
              {CURRENCIES.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div className="form-field"><label>ราคาปัจจุบัน</label><input type="number" value={info.currentPrice} onChange={e=>setInf("currentPrice",e.target.value)} placeholder="0.00" style={inputStyle}/></div>
          <div className="form-field"><label>Sector</label><input value={info.sector} onChange={e=>setInf("sector",e.target.value)} placeholder="Technology" style={inputStyle}/></div>
          <div className="form-field full"><label>หมายเหตุ</label><input value={info.note} onChange={e=>setInf("note",e.target.value)} placeholder="กลยุทธ์..." style={inputStyle}/></div>
        </div>
        <div style={{marginBottom:8,fontSize:12,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".06em"}}>ต้นทุน / การซื้อ</div>
        <div className="tab-switcher">
          <button className={`tab-sw-btn ${inputMode==="manual"?"active":""}`} onClick={()=>setInputMode("manual")}>กรอกเองโดยตรง</button>
          <button className={`tab-sw-btn ${inputMode==="dca"?"active":""}`} onClick={()=>setInputMode("dca")}>DCA (หลายครั้ง)</button>
        </div>
        {inputMode==="manual" && <div className="form-grid">
          <div className="form-field"><label>จำนวน (Qty)</label><input type="number" value={manualQty} onChange={e=>setManualQty(e.target.value)} placeholder="0" style={inputStyle}/></div>
          <div className="form-field"><label>ต้นทุนเฉลี่ย / หน่วย</label><input type="number" value={manualAvg} onChange={e=>setManualAvg(e.target.value)} placeholder="0.00" style={inputStyle}/></div>
        </div>}
        {inputMode==="dca" && <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 32px",gap:"6px 8px",marginBottom:6}}>
            {["จำนวน","ราคาที่ซื้อ","วันที่",""].map((h,i)=><span key={i} style={{fontSize:11,color:"var(--muted)",fontWeight:700}}>{h}</span>)}
          </div>
          <div className="dca-list">
            {lots.map(lot=><div key={lot.id} className="dca-row">
              <input type="number" value={lot.qty} onChange={e=>setLot(lot.id,"qty",e.target.value)} placeholder="0" style={inputStyle}/>
              <input type="number" value={lot.price} onChange={e=>setLot(lot.id,"price",e.target.value)} placeholder="0.00" style={inputStyle}/>
              <input type="date" value={lot.date} onChange={e=>setLot(lot.id,"date",e.target.value)} style={{...inputStyle,fontSize:12}}/>
              <button onClick={()=>setLots(ls=>ls.length>1?ls.filter(l=>l.id!==lot.id):ls)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",padding:6,borderRadius:6,display:"flex",alignItems:"center"}}>
                <Icon d={Icons.x} size={14}/>
              </button>
            </div>)}
          </div>
          <button className="add-dca-btn" onClick={()=>setLots(ls=>[...ls,EMPTY_LOT()])}><Icon d={Icons.plus} size={13}/> เพิ่มรอบซื้อ</button>
          {dcaR.qty>0 && <div className="dca-summary">
            <span>จำนวนรวม: <strong>{fmt(dcaR.qty,4)}</strong></span>
            <span>ต้นทุนเฉลี่ย: <strong>{fmt(dcaR.avgCost)}</strong></span>
            <span>ต้นทุนรวม: <strong>{fmt(dcaR.qty*dcaR.avgCost)}</strong></span>
          </div>}
        </div>}
      </div>
      <div className="modal-footer">
        <button className="btn-ghost" onClick={onClose}>ยกเลิก</button>
        <button className="btn-primary" onClick={handleSave} disabled={!canSave} style={{opacity:canSave?1:.5}}>
          <Icon d={Icons.check} size={16}/> บันทึก
        </button>
      </div>
    </div>
  </div>;
};

// ─── Drive Modal ─────────────────────────────────────────────────────────────
const DriveModal = ({ assets, onClose, onRestore }) => {
  const [status, setStatus] = useState("idle"), [msg, setMsg] = useState("");
  const exportJSON = () => {
    const json = JSON.stringify({version:1,exportedAt:new Date().toISOString(),assets},null,2);
    const dataUri = "data:application/json;charset=utf-8," + encodeURIComponent(json);
    const a = document.createElement("a");
    a.href = dataUri;
    a.download = `portfolio_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setStatus("saved"); setMsg("ดาวน์โหลดสำเร็จ — เช็คใน Files app");
  };
  const importJSON = (e) => {
    const file = e.target.files[0]; if (!file) return; setStatus("loading");
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.assets) { onRestore(d.assets); setStatus("saved"); setMsg(`นำเข้า ${d.assets.length} รายการสำเร็จ`); }
        else { setStatus("error"); setMsg("ไฟล์ไม่ถูกต้อง"); }
      } catch { setStatus("error"); setMsg("อ่านไฟล์ไม่ได้"); }
    };
    reader.readAsText(file);
  };
  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal drive-modal" onClick={e=>e.stopPropagation()}>

  const [assets, setAssets] = useState(load);
  const [tab, setTab] = useState("dashboard");
  const [showModal, setShowModal] = useState(false);
  const [editAsset, setEditAsset] = useState(null);
  const [showDrive, setShowDrive] = useState(false);
  const [showLog, setShowLog] = useState(false);
  const [filterType, setFilterType] = useState("ทั้งหมด");
  const [sortKey, setSortKey] = useState("value");
  const [saved, setSaved] = useState(false);
  const [priceStatus, setPriceStatus] = useState("idle");
  const [lastUpdated, setLastUpdated] = useState(() => { try { const s=JSON.parse(localStorage.getItem(SK)||"{}"); return s.lastUpdated||null; } catch { return null; } });
  const [priceLog, setPriceLog] = useState(() => { try { const s=JSON.parse(localStorage.getItem(SK)||"{}"); return s.priceLog||[]; } catch { return []; } });
  const [priceError, setPriceError] = useState("");
  const [autoRefreshMin, setAutoRefreshMin] = useState(0);
  const [confirmDelete, setConfirmDelete] = useState(null);

  useEffect(() => {
    try { localStorage.setItem(SK, JSON.stringify({assets,lastUpdated,priceLog:priceLog.slice(-20)})); setSaved(true); setTimeout(()=>setSaved(false),1500); } catch {}
  }, [assets]);

  const handleUpdatePrices = useCallback(async () => {
    if (!assets.length) return;
    setPriceStatus("loading"); setPriceError("");
    try {
      const prices = await fetchPrices(assets);
      const now = new Date().toISOString();
      setAssets(prev => prev.map(a => { const p=prices[a.ticker.toUpperCase()]; return p?{...a,currentPrice:p}:a; }));
      setLastUpdated(now);
      setPriceLog(prev => [...prev.slice(-19),{time:now,prices}]);
      setPriceStatus("done"); setTimeout(()=>setPriceStatus("idle"),3000);
    } catch(err) {
      setPriceError(err.message); setPriceStatus("error"); setTimeout(()=>setPriceStatus("idle"),5000);
    }
  }, [assets]);

  const saveAsset = (data) => {
    if (editAsset) setAssets(a=>a.map(x=>x.id===editAsset.id?{...data,id:editAsset.id}:x));
    else setAssets(a=>[...a,{...data,id:Date.now()}]);
    setShowModal(false); setEditAsset(null);
  };
  const deleteAsset = (id) => { const a=assets.find(x=>x.id===id); setConfirmDelete({id,name:a?.name||a?.ticker||"รายการนี้"}); };
  const confirmDoDelete = () => { if(confirmDelete) setAssets(a=>a.filter(x=>x.id!==confirmDelete.id)); setConfirmDelete(null); };

  const withPnl = useMemo(()=>assets.map(a=>({...a,...calcPnl(a)})),[assets]);
  const filtered = useMemo(()=>{
    let r = filterType==="ทั้งหมด"?withPnl:withPnl.filter(a=>a.type===filterType);
    return [...r].sort((a,b)=>sortKey==="value"?b.value-a.value:sortKey==="pnlPct"?b.pnlPct-a.pnlPct:sortKey==="pnlAmt"?b.pnlAmt-a.pnlAmt:a.name.localeCompare(b.name));
  },[withPnl,filterType,sortKey]);
  const summary = useMemo(()=>{
    const tc=withPnl.reduce((s,a)=>s+a.cost,0),tv=withPnl.reduce((s,a)=>s+a.value,0),tp=tv-tc;
    return {totalCost:tc,totalValue:tv,totalPnl:tp,totalPnlPct:tc>0?(tp/tc)*100:0,winners:withPnl.filter(a=>a.pnlAmt>0).length,losers:withPnl.filter(a=>a.pnlAmt<0).length};
  },[withPnl]);
  const alloc = useMemo(()=>{ const g={}; withPnl.forEach(a=>{g[a.type]=(g[a.type]||0)+a.value;}); return Object.entries(g).map(([label,value])=>({label,value})); },[withPnl]);
  const topGainer = useMemo(()=>[...withPnl].sort((a,b)=>b.pnlPct-a.pnlPct)[0],[withPnl]);
  const topLoser = useMemo(()=>[...withPnl].sort((a,b)=>a.pnlPct-b.pnlPct)[0],[withPnl]);

      </header>

      <nav className="tabs">
        {[["dashboard",Icons.pie,"Dashboard"],["portfolio",Icons.chart,"พอร์ต"],["analysis",Icons.trending_up,"วิเคราะห์"]].map(([id,icon,label])=>(
          <button key={id} className={`tab ${tab===id?"active":""}`} onClick={()=>setTab(id)}><Icon d={icon} size={15}/>{label}</button>
        ))}
      </nav>

      <main className="content">
        <PricePanel assets={assets} onUpdatePrices={handleUpdatePrices} priceStatus={priceStatus} lastUpdated={lastUpdated} autoRefreshMin={autoRefreshMin} setAutoRefreshMin={setAutoRefreshMin}/>
        {priceError && priceStatus==="error" && <div className="error-banner">⚠️ ดึงราคาไม่สำเร็จ: {priceError}</div>}

        {tab==="dashboard" && <>
          <div className="stats-grid">
            <div className="stat-card"><div className="stat-label">มูลค่าพอร์ตรวม</div><div className="stat-val">{fmtCurrency(summary.totalValue)}</div><div className="stat-sub">{assets.length} สินทรัพย์</div></div>
            <div className="stat-card"><div className="stat-label">กำไร / ขาดทุนรวม</div><div className={`stat-val ${pnlColor(summary.totalPnl)}`}>{fmtCurrency(summary.totalPnl)}</div><div className={`stat-sub ${pnlColor(summary.totalPnlPct)}`}>{pct(summary.totalPnlPct)} จากต้นทุน</div></div>
            <div className="stat-card"><div className="stat-label">ต้นทุนรวม</div><div className="stat-val">{fmtCurrency(summary.totalCost)}</div><div className="stat-sub">Cost Basis</div></div>
            <div className="stat-card"><div className="stat-label">Win / Loss</div><div className="stat-val"><span className="positive">{summary.winners}</span> <span style={{color:"var(--border)"}}>|</span> <span className="negative">{summary.losers}</span></div><div className="stat-sub">กำไร | ขาดทุน</div></div>
          </div>
          <div className="highlights">
            {topGainer && <div className="highlight-card"><div className="hl-icon" style={{background:"rgba(74,222,128,.1)"}}>🏆</div><div className="hl-info"><h4>Best Performer</h4><div className="hl-name">{topGainer.name}</div><div className="hl-val positive">{pct(topGainer.pnlPct)}</div></div><div style={{marginLeft:"auto"}}><Sparkline positive={true}/></div></div>}
            {topLoser && <div className="highlight-card"><div className="hl-icon" style={{background:"rgba(248,113,113,.1)"}}>📉</div><div className="hl-info"><h4>Worst Performer</h4><div className="hl-name">{topLoser.name}</div><div className="hl-val negative">{pct(topLoser.pnlPct)}</div></div><div style={{marginLeft:"auto"}}><Sparkline positive={false}/></div></div>}
          </div>
          <div className="dash-grid">
            <div className="card"><div className="card-title"><Icon d={Icons.chart} size={13}/> P&L by Asset</div><BarChart assets={assets}/></div>
            <div className="card"><div className="card-title"><Icon d={Icons.pie} size={13}/> Allocation</div>{alloc.length>0&&<DonutChart data={alloc}/>}</div>
          </div>
        </>}

        {tab==="portfolio" && <div className="card">
          <div className="toolbar">
            <div className="filter-chips">{["ทั้งหมด",...ASSET_TYPES].map(t=><button key={t} className={`chip ${filterType===t?"active":""}`} onClick={()=>setFilterType(t)}>{t}</button>)}</div>
            <select className="sort-sel ml-auto" value={sortKey} onChange={e=>setSortKey(e.target.value)}>
              <option value="value">Sort: มูลค่า</option><option value="pnlPct">Sort: %P&L</option><option value="pnlAmt">Sort: P&L</option><option value="name">Sort: ชื่อ</option>
            </select>
          </div>
          {filtered.length===0 ? <div className="empty-state"><h3>ยังไม่มีสินทรัพย์</h3><p>กด "+ เพิ่ม" เพื่อเริ่มต้น</p></div> :
          <div className="table-wrap"><table>
            <thead><tr><th>สินทรัพย์</th><th>ประเภท</th><th>จำนวน</th><th>ราคาปัจจุบัน</th><th>มูลค่า</th><th>P&L</th><th>%P&L</th><th>หมายเหตุ</th><th/></tr></thead>
            <tbody>{filtered.map(a=><tr key={a.id}>
              <td><div className="ticker-badge"><span className={`type-dot`} style={{background:a.type==="หุ้น"?"#60a5fa":a.type==="คริปโต"?"#f59e0b":a.type==="ETF"?"#34d399":a.type==="กองทุน"?"#f472b6":"#a78bfa"}}/><div><div style={{fontWeight:700,fontSize:13}}>{a.ticker}{a.dcaLots?.length>1&&<span className="dca-tag">DCA {a.dcaLots.length}x</span>}</div><div style={{fontSize:11,color:"var(--muted)"}}>{a.name}</div><div className="price-mobile">{fmt(a.currentPrice)} <span style={{fontSize:10}}>{a.currency}</span></div></div></div></td>
              <td><span style={{fontSize:12,color:"var(--muted)"}}>{a.type}</span></td>
              <td><span className="mono">{fmt(a.qty,a.qty%1===0?0:4)}</span></td>
              <td><span className="mono">{fmt(a.currentPrice)} <span style={{color:"var(--muted)",fontSize:10}}>{a.currency}</span></span></td>
              <td><span className="mono" style={{fontWeight:600}}>{fmt(a.value)}</span></td>
              <td><span className={`mono ${pnlColor(a.pnlAmt)}`}>{a.pnlAmt>=0?"+":""}{fmt(a.pnlAmt)}</span></td>
              <td><span className={`mono ${pnlColor(a.pnlPct)}`} style={{fontWeight:700}}>{pct(a.pnlPct)}</span></td>
              <td><span className="note-text" title={a.note}>{a.note||"—"}</span></td>
              <td><div className="actions">
                <button className="icon-btn" onClick={()=>{setEditAsset(a);setShowModal(true);}}><Icon d={Icons.edit} size={15}/></button>
                <button className="icon-btn danger" onClick={()=>deleteAsset(a.id)}><Icon d={Icons.trash} size={15}/></button>
              </div></td>
            </tr>)}</tbody>
          </table></div>}
        </div>}

        {tab==="analysis" && <>
          <div className="stats-grid">
            {ASSET_TYPES.map(type=>{
              const items=withPnl.filter(a=>a.type===type); if(!items.length) return null;
              const tv=items.reduce((s,a)=>s+a.value,0),tc=items.reduce((s,a)=>s+a.cost,0),tp=items.reduce((s,a)=>s+a.pnlAmt,0),pp=tc>0?(tp/tc)*100:0;
              return <div key={type} className="stat-card"><div className="stat-label">{type}</div><div className="stat-val">{fmt(tv)}</div><div className={`stat-sub ${pnlColor(pp)}`}>{pct(pp)} • {items.length} รายการ</div></div>;
            })}
          </div>
          <div className="card">
            <div className="card-title"><Icon d={Icons.trending_up} size={13}/> Sector Breakdown</div>
            <div className="table-wrap"><table>
              <thead><tr><th>Sector</th><th>สินทรัพย์</th><th>มูลค่ารวม</th><th>ต้นทุนรวม</th><th>P&L</th><th>%P&L</th></tr></thead>
              <tbody>{(()=>{
                const s={};
                withPnl.forEach(a=>{const k=a.sector||"Other";if(!s[k])s[k]=[];s[k].push(a);});
                return Object.entries(s).map(([sector,items])=>{
                  const v=items.reduce((s,a)=>s+a.value,0),c=items.reduce((s,a)=>s+a.cost,0),pa=v-c,pp=c>0?(pa/c)*100:0;
                  return <tr key={sector}><td style={{fontWeight:600}}>{sector}</td><td><span className="mono">{items.map(i=>i.ticker).join(", ")}</span></td><td><span className="mono">{fmt(v)}</span></td><td><span className="mono">{fmt(c)}</span></td><td><span className={`mono ${pnlColor(pa)}`}>{pa>=0?"+":""}{fmt(pa)}</span></td><td><span className={`mono ${pnlColor(pp)}`} style={{fontWeight:700}}>{pct(pp)}</span></td></tr>;
                });
              })()}</tbody>
            </table></div>
          </div>
        </>}
      </main>
    </div>

    {showModal && <Modal asset={editAsset} onSave={saveAsset} onClose={()=>{setShowModal(false);setEditAsset(null);}}/>}
    {showDrive && <DriveModal assets={assets} onClose={()=>setShowDrive(false)} onRestore={d=>{setAssets(d);setShowDrive(false);}}/>}
    {showLog && <PriceLogModal log={priceLog} onClose={()=>setShowLog(false)}/>}
    {confirmDelete && <div className="modal-overlay" onClick={()=>setConfirmDelete(null)}>
      <div className="confirm-dialog" onClick={e=>e.stopPropagation()}>
        <div className="confirm-icon">🗑️</div>
        <div className="confirm-title">ยืนยันการลบ</div>
        <div className="confirm-msg">ต้องการลบ <strong>{confirmDelete.name}</strong> ออกจากพอร์ตหรือไม่?</div>
        <div className="confirm-actions">
          <button className="btn-ghost" onClick={()=>setConfirmDelete(null)}>ยกเลิก</button>
          <button className="btn-delete" onClick={confirmDoDelete}><Icon d={Icons.trash} size={15}/> ลบ</button>
        </div>
      </div>
    </div>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
