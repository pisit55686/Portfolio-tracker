// ─── Helpers ────────────────────────────────────────────────────────────────
const fmt = (n, decimals = 2) => n == null || isNaN(n) ? "—" : Number(n).toLocaleString("th-TH", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
const fmtCurrency = (n) => n == null || isNaN(n) ? "—" : (n >= 0 ? "" : "-") + "$" + Math.abs(Number(n)).toLocaleString("th-TH", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const pct = (n) => n == null || isNaN(n) ? "—" : `${n >= 0 ? "+" : ""}${Number(n).toFixed(2)}%`;
const pnlColor = (n) => n > 0 ? "positive" : n < 0 ? "negative" : "neutral";
const timeAgo = (iso) => {
  if (!iso) return "ไม่เคย";
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return new Date(iso).toLocaleDateString("th-TH");
};

const ASSET_TYPES = ["หุ้น","คริปโต","ETF","กองทุน","อื่นๆ"];
const CURRENCIES = ["USD","THB","BTC","ETH"];
const SAMPLE_DATA = [

const calcPnl = (a) => {
  const cost = a.qty * a.avgCost, value = a.qty * a.currentPrice, pnlAmt = value - cost;
  return { cost, value, pnlAmt, pnlPct: cost > 0 ? (pnlAmt / cost) * 100 : 0 };
};

// ─── Free Price APIs ─────────────────────────────────────────────────────────
const CRYPTO_IDS = {
  BTC:"bitcoin",ETH:"ethereum",BNB:"binancecoin",SOL:"solana",ADA:"cardano",
  XRP:"ripple",DOT:"polkadot",DOGE:"dogecoin",AVAX:"avalanche-2",
  MATIC:"matic-network",LINK:"chainlink",UNI:"uniswap",ATOM:"cosmos",
  LTC:"litecoin",BCH:"bitcoin-cash",
};

const fetchCryptoPrices = async (tickers) => {
  if (!tickers.length) return {};
  const ids = tickers.map(t => CRYPTO_IDS[t.toUpperCase()] || t.toLowerCase()).join(",");
  const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
  if (!res.ok) throw new Error("CoinGecko error");
  const data = await res.json();
  const result = {};
  tickers.forEach(t => {
    const id = CRYPTO_IDS[t.toUpperCase()] || t.toLowerCase();
    if (data[id]?.usd) result[t.toUpperCase()] = data[id].usd;
  });
  return result;
};

const fetchStockPrice = async (ticker, currency) => {
  const yTicker = currency === "THB" && !ticker.includes(".") ? ticker + ".BK" : ticker;
  const url = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${yTicker}?interval=1d&range=1d`)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Yahoo error for ${ticker}`);
  const wrapper = await res.json();
  const data = JSON.parse(wrapper.contents);
  const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
  if (!price) throw new Error(`No price for ${ticker}`);
  return price;
};

const fetchPrices = async (assets) => {
  const results = {};
  const cryptoAssets = assets.filter(a => a.type === "คริปโต");
  const stockAssets = assets.filter(a => a.type !== "คริปโต");
  if (cryptoAssets.length) {
    try {
      const cp = await fetchCryptoPrices(cryptoAssets.map(a => a.ticker));
      Object.assign(results, cp);
    } catch(e) { console.warn("CoinGecko:", e.message); }
  }
  await Promise.allSettled(stockAssets.map(async (a) => {
    try {
      const price = await fetchStockPrice(a.ticker, a.currency);
      results[a.ticker.toUpperCase()] = price;
    } catch(e) { console.warn(`Stock ${a.ticker}:`, e.message); }
  }));
  return results;
};

// ─── Sparkline ───────────────────────────────────────────────────────────────
const Sparkline = ({ positive }) => {
  const points = useMemo(() => {
    const arr = [50];
    for (let i = 1; i < 20; i++) arr.push(Math.max(5, Math.min(95, arr[i-1] + (Math.random() - (positive ? 0.35 : 0.65)) * 15)));
    return arr;
  }, [positive]);
  const pts = points.map((y, x) => `${(x/19)*100},${y}`).join(" ");
  return <svg viewBox="0 0 100 100" width="70" height="28" preserveAspectRatio="none">
    <polyline points={pts} fill="none" stroke={positive ? "#4ade80" : "#f87171"} strokeWidth="2.5"/>
  </svg>;
};

// ─── DonutChart ──────────────────────────────────────────────────────────────
const DonutChart = ({ data }) => {
  const total = data.reduce((s,d) => s+d.value, 0);
  let offset = 0;
  const R = 60, C = 2*Math.PI*R;
  const COLORS = ["#60a5fa","#f59e0b","#34d399","#f472b6","#a78bfa","#fb923c"];
  const slices = data.map((d,i) => {
    const p = d.value/total;
    const s = { ...d, dash:p*C, gap:C-p*C, offset:offset*C, color:COLORS[i%COLORS.length] };
    offset += p; return s;
  });
  return <div className="donut-wrap">
    <svg viewBox="0 0 160 160" width="160" height="160">
      <circle cx="80" cy="80" r={R} fill="none" stroke="#1e293b" strokeWidth="24"/>
      {slices.map((s,i) => <circle key={i} cx="80" cy="80" r={R} fill="none" stroke={s.color} strokeWidth="22"
        strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={C/4-s.offset}/>)}
      <text x="80" y="76" textAnchor="middle" fill="#f1f5f9" fontSize="11" fontWeight="700">Portfolio</text>
      <text x="80" y="92" textAnchor="middle" fill="#94a3b8" fontSize="9">Allocation</text>
    </svg>
    <div className="donut-legend">
      {slices.map((s,i) => <div key={i} className="legend-item">
        <span className="legend-dot" style={{background:s.color}}/>
        <span className="legend-label">{s.label}</span>
        <span className="legend-pct">{((s.value/total)*100).toFixed(1)}%</span>
      </div>)}
    </div>
  </div>;
};

// ─── BarChart ────────────────────────────────────────────────────────────────
const BarChart = ({ assets }) => {
  const data = assets.map(a => ({...a,...calcPnl(a)})).sort((a,b) => b.pnlPct-a.pnlPct);
  const max = Math.max(...data.map(d => Math.abs(d.pnlPct)), 1);
  return <div className="bar-chart">
    {data.map(d => <div key={d.id} className="bar-row">
      <span className="bar-ticker">{d.ticker}</span>
      <div className="bar-track"><div className="bar-fill" style={{width:`${(Math.abs(d.pnlPct)/max)*100}%`,background:d.pnlPct>=0?"#4ade80":"#f87171"}}/></div>
      <span className={`bar-val ${pnlColor(d.pnlPct)}`}>{pct(d.pnlPct)}</span>
    </div>)}
  </div>;
};


// ─── Benchmark data generator (realistic index approximation) ────────────────
// Since we can't call APIs in static HTML for historical data,
// we simulate index growth from a known base using real approximate annual returns
// User can override by fetching real data via the Update button
const generateIndexData = (startDate, endDate, annualReturnPct, label) => {
  const points = [];
  const start = new Date(startDate);
  const end = new Date(endDate);
  const days = Math.ceil((end - start) / 86400000);
  const dailyReturn = Math.pow(1 + annualReturnPct / 100, 1/365) - 1;
  // Add realistic noise
  const seed = label.length;
  let val = 100;
  for (let i = 0; i <= days; i += Math.max(1, Math.floor(days/120))) {
    const noise = (Math.sin(i * 0.3 + seed) * 0.008) + (Math.cos(i * 0.17 + seed) * 0.005);
    val = val * (1 + dailyReturn + noise);
    const d = new Date(start); d.setDate(d.getDate() + i);
    points.push({ date: d.toISOString().slice(0,10), value: val });
  }
  // Ensure last point is exactly at end
  const lastVal = points[points.length-1]?.value || 100;
  points.push({ date: endDate, value: lastVal });
  return points;
};

// ─── Growth Chart ────────────────────────────────────────────────────────────
const PERIODS = [
  { label:"1M",  months:1  },
  { label:"3M",  months:3  },
  { label:"6M",  months:6  },
  { label:"YTD", months:0, ytd:true },
  { label:"1Y",  months:12 },
  { label:"2Y",  months:24 },
  { label:"ALL", months:0, all:true },
];

const BENCHMARKS = [
  { id:"sp500",  label:"S&P 500",    color:"#f59e0b", annualReturn:10.5 },
  { id:"nasdaq", label:"NASDAQ 100", color:"#a78bfa", annualReturn:14.2 },
  { id:"btc",    label:"Bitcoin",    color:"#fb923c", annualReturn:85   },
  { id:"gold",   label:"Gold",       color:"#fde68a", annualReturn:7.2  },
];

const GrowthChart = ({ assets }) => {
  const svgRef = useRef(null);
  const [period, setPeriod] = useState("1Y");
  const [activeBenchmarks, setActiveBenchmarks] = useState(["sp500"]);
  const [tooltip, setTooltip] = useState(null);
  const [fetchingBench, setFetchingBench] = useState(false);
  const [benchError, setBenchError] = useState("");

  // Build portfolio growth curve from DCA lots or dateAdded
  const portfolioSeries = useMemo(() => {
    // Collect all buy events across assets
    const events = [];
    assets.forEach(asset => {
      if (asset.dcaLots?.length) {
        asset.dcaLots.forEach(lot => {
          if (lot.date && lot.qty && lot.price) {
            events.push({ date: lot.date, ticker: asset.ticker, qty: parseFloat(lot.qty), price: parseFloat(lot.price), currentPrice: asset.currentPrice });
          }
        });
      } else if (asset.dateAdded) {
        events.push({ date: asset.dateAdded, ticker: asset.ticker, qty: asset.qty, price: asset.avgCost, currentPrice: asset.currentPrice });
      }
    });
    if (!events.length) return [];
    events.sort((a,b) => a.date.localeCompare(b.date));

    // Determine date range for period
    const now = new Date();
    const periodObj = PERIODS.find(p => p.label === period) || PERIODS[4];
    let startDate;
    if (periodObj.all) startDate = new Date(events[0].date);
    else if (periodObj.ytd) startDate = new Date(now.getFullYear(), 0, 1);
    else { startDate = new Date(now); startDate.setMonth(startDate.getMonth() - periodObj.months); }

    // Build daily portfolio value snapshots
    // Simple approach: at each date point, calculate total value
    // using cost basis up to that date vs current price extrapolated backwards
    const allDates = [];
    const cur = new Date(startDate);
    while (cur <= now) {
      allDates.push(cur.toISOString().slice(0,10));
      cur.setDate(cur.getDate() + Math.ceil((now - startDate) / 86400000 / 90));
    }
    if (!allDates.includes(now.toISOString().slice(0,10))) allDates.push(now.toISOString().slice(0,10));

    // For each date, sum cost of all buys up to that date
    const points = allDates.map(date => {
      const relevantEvents = events.filter(e => e.date <= date);
      if (!relevantEvents.length) return null;
      // Total invested up to this date
      const totalInvested = relevantEvents.reduce((s,e) => s + e.qty * e.price, 0);
      // Estimate current-day value by scaling (simplified: assume linear price appreciation)
      // For a proper chart we'd need historical prices — here we use a weighted interpolation
      const totalCurrentValue = relevantEvents.reduce((s,e) => {
        // Interpolate price between buy date and today
        const buyTs = new Date(e.date).getTime();
        const nowTs = now.getTime();
        const dateTs = new Date(date).getTime();
        const progress = nowTs > buyTs ? Math.min(1, (dateTs - buyTs) / (nowTs - buyTs)) : 0;
        const interpPrice = e.price + (e.currentPrice - e.price) * progress;
        return s + e.qty * interpPrice;
      }, 0);
      return { date, value: totalCurrentValue, invested: totalInvested };
    }).filter(Boolean);

    if (!points.length) return [];
    // Normalize to 100 at start
    const base = points[0].value || 1;
    return points.map(p => ({ ...p, normalized: (p.value / base) * 100 }));
  }, [assets, period]);

  // Build benchmark series
  const benchSeries = useMemo(() => {
    if (!portfolioSeries.length) return {};
    const startDate = portfolioSeries[0].date;
    const endDate = portfolioSeries[portfolioSeries.length-1].date;
    const result = {};
    BENCHMARKS.forEach(b => {
      if (activeBenchmarks.includes(b.id)) {
        result[b.id] = generateIndexData(startDate, endDate, b.annualReturn, b.id);
      }
    });
    return result;
  }, [portfolioSeries, activeBenchmarks]);

  const toggleBenchmark = (id) => {
    setActiveBenchmarks(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };

  // SVG chart rendering
  const chartData = useMemo(() => {
    if (!portfolioSeries.length) return null;
    const W = 800, H = 280, PL = 52, PR = 16, PT = 16, PB = 36;
    const cW = W - PL - PR, cH = H - PT - PB;

    // Collect all series for unified y scale
    const allValues = [...portfolioSeries.map(p => p.normalized)];
    Object.values(benchSeries).forEach(s => s.forEach(p => allValues.push(p.value)));
    const minY = Math.min(...allValues) * 0.97;
    const maxY = Math.max(...allValues) * 1.03;

    const allDates = portfolioSeries.map(p => p.date);
    const minX = allDates[0], maxX = allDates[allDates.length-1];
    const minTs = new Date(minX).getTime(), maxTs = new Date(maxX).getTime();

    const xPos = (date) => PL + ((new Date(date).getTime() - minTs) / (maxTs - minTs || 1)) * cW;
    const yPos = (val) => PT + (1 - (val - minY) / (maxY - minY || 1)) * cH;

    // Portfolio path
    const portPath = portfolioSeries.map((p,i) => `${i===0?'M':'L'}${xPos(p.date).toFixed(1)},${yPos(p.normalized).toFixed(1)}`).join(' ');
    // Portfolio area fill path
    const areaPath = portPath + ` L${xPos(maxX).toFixed(1)},${(PT+cH).toFixed(1)} L${PL},${(PT+cH).toFixed(1)} Z`;

    // Benchmark paths
    const benchPaths = {};
    Object.entries(benchSeries).forEach(([id, series]) => {
      benchPaths[id] = series.map((p,i) => `${i===0?'M':'L'}${xPos(p.date).toFixed(1)},${yPos(p.value).toFixed(1)}`).join(' ');
    });

    // Y axis ticks
    const yTicks = [];
    const yRange = maxY - minY;
    const step = yRange > 200 ? 50 : yRange > 50 ? 20 : yRange > 20 ? 10 : 5;
    for (let v = Math.ceil(minY/step)*step; v <= maxY; v += step) {
      yTicks.push({ v, y: yPos(v) });
    }

    // X axis ticks (date labels)
    const xTicks = [];
    const numTicks = Math.min(6, portfolioSeries.length);
    for (let i = 0; i < numTicks; i++) {
      const idx = Math.floor(i * (portfolioSeries.length-1) / (numTicks-1));
      const p = portfolioSeries[idx];
      xTicks.push({ date: p.date, x: xPos(p.date) });
    }

    // Current portfolio return
    const startVal = portfolioSeries[0]?.value || 1;
    const endVal = portfolioSeries[portfolioSeries.length-1]?.value || 1;
    const portfolioReturn = ((endVal / startVal) - 1) * 100;

    return { W, H, PL, PR, PT, PB, cW, cH, portPath, areaPath, benchPaths, yTicks, xTicks, xPos, yPos, portfolioReturn, minY, maxY, minTs, maxTs, cH_val: cH };
  }, [portfolioSeries, benchSeries]);

  // Tooltip interaction
  const handleMouseMove = useCallback((e) => {
    if (!chartData || !svgRef.current || !portfolioSeries.length) return;
    const rect = svgRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const relX = (clientX - rect.left) / rect.width * chartData.W;
    const progress = Math.max(0, Math.min(1, (relX - chartData.PL) / chartData.cW));
    const idx = Math.round(progress * (portfolioSeries.length - 1));
    const point = portfolioSeries[Math.max(0, Math.min(idx, portfolioSeries.length-1))];
    if (!point) return;
    // Get benchmark values at closest date
    const benchVals = {};
    Object.entries(benchSeries).forEach(([id, series]) => {
      const bi = Math.round(progress * (series.length-1));
      benchVals[id] = series[Math.max(0,Math.min(bi, series.length-1))]?.value;
    });
    setTooltip({ point, benchVals, x: chartData.xPos(point.date), y: chartData.yPos(point.normalized) });
  }, [chartData, portfolioSeries, benchSeries]);

  const handleMouseLeave = () => setTooltip(null);

  const portReturn = portfolioSeries.length >= 2
    ? ((portfolioSeries[portfolioSeries.length-1].value / portfolioSeries[0].value) - 1) * 100
    : 0;

  return (
    <div className="card growth-card">
      {/* Header */}
      <div className="growth-header">
        <div className="card-title" style={{marginBottom:0}}>
          <Icon d={Icons.activity} size={13}/> Portfolio Growth
        </div>
        <div className="growth-return" style={{color: portReturn >= 0 ? "var(--positive)" : "var(--negative)"}}>
          {portfolioSeries.length >= 2 ? pct(portReturn) : "—"}
        </div>
      </div>

      {/* Period selector */}
      <div className="period-row">
        <div className="period-chips">
          {PERIODS.map(p => (
            <button key={p.label} className={`period-chip ${period===p.label?"active":""}`} onClick={()=>setPeriod(p.label)}>
              {p.label}
            </button>
          ))}
        </div>
      </div>

const PricePanel = ({ assets, onUpdatePrices, priceStatus, lastUpdated, autoRefreshMin, setAutoRefreshMin }) => {

  useEffect(() => {

// ─── DCA helper ──────────────────────────────────────────────────────────────
const calcDCA = (lots) => {
  const v = lots.filter(l => l.qty && l.price && !isNaN(l.qty) && !isNaN(l.price));
  if (!v.length) return { qty:0, avgCost:0 };
  const tq = v.reduce((s,l) => s+parseFloat(l.qty), 0);
  const tc = v.reduce((s,l) => s+parseFloat(l.qty)*parseFloat(l.price), 0);
  return { qty:tq, avgCost:tc/tq };
};

const DriveModal = ({ assets, onClose, onRestore }) => {
  const [status, setStatus] = useState("idle"), [msg, setMsg] = useState("");
  const exportJSON = () => {
    const json = JSON.stringify({version:1,exportedAt:new Date().toISOString(),assets},null,2);
    const dataUri = "data:application/json;charset=utf-8," + encodeURIComponent(json);
    const a = document.createElement("a");
    a.href = dataUri;
    a.download = `portfolio_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setStatus("saved"); setMsg("ดาวน์โหลดสำเร็จ — เช็คใน Files app");
  };
  const importJSON = (e) => {
    const file = e.target.files[0]; if (!file) return; setStatus("loading");
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.assets) { onRestore(d.assets); setStatus("saved"); setMsg(`นำเข้า ${d.assets.length} รายการสำเร็จ`); }
        else { setStatus("error"); setMsg("ไฟล์ไม่ถูกต้อง"); }
      } catch { setStatus("error"); setMsg("อ่านไฟล์ไม่ได้"); }
    };
    reader.readAsText(file);
  };
  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal drive-modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-header"><span>🗄️ สำรอง / กู้คืนข้อมูล</span><button className="icon-btn" onClick={onClose}><Icon d={Icons.x}/></button></div>

            <button className="btn-primary" onClick={exportJSON}><Icon d={Icons.download} size={16}/> ดาวน์โหลด JSON</button>
            <button className="btn-ghost" onClick={()=>window.open("https://drive.google.com","_blank")}><Icon d={Icons.cloud} size={16}/> Google Drive</button>
          </div>
        </div>
        <div className="drive-divider"/>
        <div className="drive-section"><h3>📂 Import</h3><p>เลือกไฟล์ JSON ที่เคย export ไว้</p>
          <label className="file-upload-label"><Icon d={Icons.upload} size={16}/> เลือกไฟล์<input type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/></label>
        </div>

      </div>

};

// ─── TOOLS TAB (DCA Calculator + Break-even + Cost vs Market) ─────────────────
const ToolsTab = ({ assets, usdThb }) => {
  const [activeAsset, setActiveAsset] = useState(assets[0]?.id || null);
  const [dcaAmt, setDcaAmt] = useState("100");
  const [dcaFreq, setDcaFreq] = useState("monthly");
  const [dcaMonths, setDcaMonths] = useState("12");
  const [dcaReturn, setDcaReturn] = useState("10");

  const asset = assets.find(a => a.id === activeAsset) || assets[0];

  // Break-even calculation
  const breakEven = useMemo(() => {
    if (!asset) return null;
    const currentValue = asset.qty * asset.currentPrice;
    const costBasis = asset.qty * asset.avgCost;
    const needed = costBasis - currentValue;
    const breakEvenPrice = asset.avgCost;
    const pctToBreakEven = ((breakEvenPrice - asset.currentPrice) / asset.currentPrice) * 100;
    return { breakEvenPrice, pctToBreakEven, costBasis, currentValue, pnl: currentValue - costBasis };
  }, [asset]);

  // DCA calculator
  const dcaResult = useMemo(() => {
    if (!asset || !dcaAmt || !dcaMonths) return null;
    const amt = parseFloat(dcaAmt) || 0;
    const months = parseInt(dcaMonths) || 0;
    const ret = parseFloat(dcaReturn) / 100 / 12; // monthly return
    const freq = dcaFreq === "weekly" ? 4.33 : dcaFreq === "daily" ? 30 : 1;
    const periods = months * freq;
    const perPeriod = amt / freq;

    // Future value of DCA (FV of annuity)
    const fv = ret > 0
      ? perPeriod * ((Math.pow(1 + ret, periods) - 1) / ret)
      : perPeriod * periods;

    const totalInvested = amt * months;
    const currentHolding = asset.qty * asset.currentPrice;
    const newQty = totalInvested / asset.currentPrice; // simplified: buy at current price
    const totalQty = asset.qty + newQty;
    const totalCost = asset.qty * asset.avgCost + totalInvested;
    const newAvgCost = totalCost / totalQty;
    const projectedValue = fv + currentHolding;

    return { totalInvested, newQty, totalQty, newAvgCost, projectedValue, projectedReturn: ((projectedValue / (totalCost)) - 1) * 100, totalCost };
  }, [asset, dcaAmt, dcaFreq, dcaMonths, dcaReturn]);

// ─── Cost vs Market Price Chart ────────────────────────────────────────────────
const CostVsMarketChart = ({ asset }) => {
  const lots = asset?.dcaLots?.filter(l => l.qty && l.price) || [];
  if (lots.length < 2) return (
    <div className="card">
      <div className="card-title"><Icon d={Icons.activity} size={13}/> Cost vs Market Price Timeline</div>
      <div style={{textAlign:"center",padding:"32px 0",color:"var(--muted)",fontSize:13}}>
        ต้องการข้อมูล DCA อย่างน้อย 2 รายการ — เพิ่มสินทรัพย์แบบ DCA เพื่อดูกราฟนี้
      </div>
    </div>
  );

  const sorted = [...lots].sort((a,b) => a.date.localeCompare(b.date));
  // Build running avg cost at each buy point
  let runQty = 0, runCost = 0;
  const points = sorted.map(l => {
    runQty += parseFloat(l.qty);
    runCost += parseFloat(l.qty) * parseFloat(l.price);
    return { date: l.date, buyPrice: parseFloat(l.price), avgCost: runCost / runQty, qty: parseFloat(l.qty) };
  });
  // Add current price point
  points.push({ date: new Date().toISOString().slice(0,10), buyPrice: null, avgCost: asset.avgCost, currentPrice: asset.currentPrice });

  const W=800,H=260,PL=60,PR=16,PT=12,PB=36;
  const cW=W-PL-PR, cH=H-PT-PB;
  const allPrices = points.flatMap(p=>[p.buyPrice,p.avgCost,p.currentPrice]).filter(Boolean);
  const minY=Math.min(...allPrices)*0.93, maxY=Math.max(...allPrices)*1.07;
  const minTs=new Date(points[0].date).getTime(), maxTs=Date.now();
  const xP = d => PL + ((new Date(d).getTime()-minTs)/(maxTs-minTs||1))*cW;
  const yP = v => PT + (1-(v-minY)/(maxY-minY||1))*cH;

  // Paths
  const avgPath = points.map((p,i)=>`${i===0?"M":"L"}${xP(p.date).toFixed(1)},${yP(p.avgCost).toFixed(1)}`).join(" ");
  // Current price horizontal line
  const cpY = yP(asset.currentPrice).toFixed(1);

  // Y ticks
  const range = maxY-minY;
  const step = range>50000?10000:range>10000?5000:range>1000?500:range>100?50:10;
  const yTicks=[];
  for(let v=Math.ceil(minY/step)*step;v<=maxY;v+=step) yTicks.push({v,y:yP(v)});

  // X ticks
  const xTicks = points.filter((_,i)=>i===0||i===Math.floor(points.length/2)||i===points.length-1);

  return (
    <div className="card">
      <div className="card-title" style={{marginBottom:8}}>
        <Icon d={Icons.activity} size={13}/> Cost vs Market Price Timeline — {asset.ticker}
      </div>
      <div style={{display:"flex",gap:16,marginBottom:12,flexWrap:"wrap"}}>
        <div className="legend-item-sm"><span style={{width:16,height:2,background:"#fbbf24",borderRadius:2,display:"inline-block"}}/> ต้นทุนเฉลี่ย (Running Avg)</div>
        <div className="legend-item-sm"><span style={{width:8,height:8,background:"#60a5fa",borderRadius:"50%",display:"inline-block"}}/> ราคาที่ซื้อแต่ละครั้ง</div>
        <div className="legend-item-sm"><span style={{width:16,height:2,background:"#4ade80",borderRadius:2,display:"inline-block",borderTop:"2px dashed #4ade80"}}/> ราคาปัจจุบัน</div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
        <defs>
          <clipPath id="cvmClip"><rect x={PL} y={PT} width={cW} height={cH}/></clipPath>
        </defs>
        {/* Grid */}
        {yTicks.map((t,i)=><g key={i}>
          <line x1={PL} y1={t.y} x2={PL+cW} y2={t.y} stroke="#1e2d4a" strokeWidth="1"/>
          <text x={PL-6} y={t.y+4} textAnchor="end" fill="#5a7a9a" fontSize="9">${t.v>=1000?`${(t.v/1000).toFixed(0)}k`:t.v}</text>
        </g>)}
        {/* X labels */}
        {xTicks.map((p,i)=><text key={i} x={xP(p.date)} y={PT+cH+20} textAnchor="middle" fill="#5a7a9a" fontSize="9">
          {new Date(p.date).toLocaleDateString("th-TH",{month:"short",year:"2-digit"})}
        </text>)}
        {/* Current price dashed line */}
        <line x1={PL} y1={cpY} x2={PL+cW} y2={cpY} stroke="#4ade80" strokeWidth="1.5" strokeDasharray="6,3" clipPath="url(#cvmClip)"/>
        <text x={PL+cW-2} y={parseFloat(cpY)-4} textAnchor="end" fill="#4ade80" fontSize="9" fontWeight="700">${fmt(asset.currentPrice)}</text>
        {/* Avg cost line */}
        <path d={avgPath} fill="none" stroke="#fbbf24" strokeWidth="2" clipPath="url(#cvmClip)"/>
        {/* Buy dots — size proportional to qty */}
        {points.filter(p=>p.buyPrice).map((p,i)=>{
          const maxQty = Math.max(...points.filter(x=>x.qty).map(x=>x.qty));
          const r = 3 + (p.qty/maxQty)*6;
          const isAbove = p.buyPrice > p.avgCost;
          return <g key={i}>
            <circle cx={xP(p.date)} cy={yP(p.buyPrice)} r={r} fill={isAbove?"rgba(248,113,113,.8)":"rgba(96,165,250,.8)"} stroke={isAbove?"#f87171":"#60a5fa"} strokeWidth="1.5" clipPath="url(#cvmClip)"/>
          </g>;
        })}
      </svg>
      <div style={{fontSize:11,color:"var(--muted)",marginTop:6}}>
        ⬤ สีน้ำเงิน = ซื้อต่ำกว่าเฉลี่ย (ดี) &nbsp; ⬤ สีแดง = ซื้อสูงกว่าเฉลี่ย &nbsp; ขนาดจุด = ปริมาณที่ซื้อ
      </div>
    </div>
  );
};

const GoalsTab = ({ assets, goals, saveGoal, deleteGoal, usdThb }) => {

  const [editGoal, setEditGoal] = useState(null);
  const [form, setForm] = useState({ name:"", targetUSD:"", currency:"USD", deadline:"", note:"" });

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const handleSave = () => {
    if (!form.name || !form.targetUSD) return;
    saveGoal({ ...form, id: editGoal?.id || null });
    setForm({ name:"", targetUSD:"", currency:"USD", deadline:"", note:"" });
    setShowForm(false); setEditGoal(null);
  };

  const inputS = {background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"9px 12px",borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none",width:"100%"};

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Current value card */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div className="stat-card">
          <div className="stat-label">มูลค่าพอร์ตปัจจุบัน</div>
          <div className="stat-val">${fmt(totalValue)}</div>
          <div className="stat-sub">≈ ฿{fmt(totalValue*usdThb,0)}</div>
        </div>
        <div className="stat-card" style={{cursor:"pointer"}} onClick={()=>{setEditGoal(null);setForm({name:"",targetUSD:"",currency:"USD",deadline:"",note:""});setShowForm(true);}}>
          <div className="stat-label">เพิ่มเป้าหมายใหม่</div>
          <div className="stat-val" style={{color:"var(--accent)"}}>+</div>
          <div className="stat-sub">ตั้งเป้าหมายการลงทุน</div>
        </div>
      </div>

      {/* Add/Edit form */}
      {showForm && (
        <div className="card">
          <div className="card-title"><Icon d={Icons.target} size={13}/> {editGoal?"แก้ไขเป้าหมาย":"เพิ่มเป้าหมายใหม่"}</div>
          <div className="form-grid">
            <div className="form-field full"><label>ชื่อเป้าหมาย</label><input value={form.name} onChange={e=>setF("name",e.target.value)} placeholder="เช่น ซื้อบ้าน, เกษียณ, 1 BTC" style={inputS}/></div>
            <div className="form-field"><label>มูลค่าเป้าหมาย (USD)</label><input type="number" value={form.targetUSD} onChange={e=>setF("targetUSD",e.target.value)} placeholder="100000" style={inputS}/></div>

            <div className="form-field full"><label>หมายเหตุ</label><input value={form.note} onChange={e=>setF("note",e.target.value)} placeholder="รายละเอียดเพิ่มเติม..." style={inputS}/></div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:16,justifyContent:"flex-end"}}>
            <button className="btn-ghost" onClick={()=>{setShowForm(false);setEditGoal(null);}}>ยกเลิก</button>
            <button className="btn-primary" onClick={handleSave}><Icon d={Icons.check} size={15}/> บันทึก</button>
          </div>
        </div>
      )}

      {/* Goals list */}
      {goals.length === 0 && !showForm && (
        <div className="card"><div className="empty-state">
          <h3>ยังไม่มีเป้าหมาย</h3>
          <p style={{marginTop:8}}>กดปุ่ม + เพื่อตั้งเป้าหมายแรกของคุณ</p>
          <button className="btn-primary" style={{marginTop:16}} onClick={()=>setShowForm(true)}><Icon d={Icons.plus} size={15}/> เพิ่มเป้าหมาย</button>
        </div></div>
      )}

      {goals.map(g => {
        const target = parseFloat(g.targetUSD) || 1;
        const progress = Math.min(100, (totalValue / target) * 100);
        const remaining = target - totalValue;
        const daysLeft = g.deadline ? Math.ceil((new Date(g.deadline) - new Date()) / 86400000) : null;
        const isAchieved = totalValue >= target;

        // Projection: at current monthly DCA rate, when will we hit target?
        const lots = assets.flatMap(a => a.dcaLots || []).filter(l => l.date && l.qty && l.price);
        const monthlyAvg = lots.length > 1 ? (() => {
          const sorted = [...lots].sort((a,b) => a.date.localeCompare(b.date));
          const months = (new Date(sorted[sorted.length-1].date) - new Date(sorted[0].date)) / (30*86400000) || 1;
          return lots.reduce((s,l) => s + parseFloat(l.qty)*parseFloat(l.price), 0) / months;
        })() : 0;

        const monthsToGoal = monthlyAvg > 0 && !isAchieved
          ? Math.ceil(remaining / monthlyAvg)
          : null;

        return (
          <div key={g.id} className="card goal-card">
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
              <div>
                <div style={{fontWeight:800,fontSize:16,display:"flex",alignItems:"center",gap:8}}>

              </div>
              <div style={{display:"flex",gap:4}}>
                <button className="icon-btn" onClick={()=>{setEditGoal(g);setForm({...g});setShowForm(true);}}><Icon d={Icons.edit} size={15}/></button>

              </div>
            </div>

            {/* Progress bar */}
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:8}}>
                <span style={{fontFamily:"var(--font-mono)",color:"var(--text)",fontWeight:700}}>${fmt(totalValue)} <span style={{color:"var(--muted)",fontWeight:400}}>/ ${fmt(target)}</span></span>
                <span style={{fontFamily:"var(--font-mono)",fontWeight:800,color:isAchieved?"var(--positive)":"var(--accent)"}}>{progress.toFixed(1)}%</span>
              </div>
              <div style={{background:"var(--border)",borderRadius:8,height:12,overflow:"hidden",position:"relative"}}>
                <div style={{
                  width:`${progress}%`, height:"100%", borderRadius:8, transition:"width .8s ease",
                  background: isAchieved
                    ? "linear-gradient(90deg,#4ade80,#22d3ee)"
                    : progress > 75 ? "linear-gradient(90deg,#3b82f6,#8b5cf6)"
                    : progress > 40 ? "linear-gradient(90deg,#3b82f6,#60a5fa)"
                    : "linear-gradient(90deg,#1e3a5f,#3b82f6)"
                }}/>
                {progress > 10 && <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:8,fontSize:10,color:"#fff",fontWeight:700}}>{progress.toFixed(0)}%</div>}
              </div>
            </div>

            {/* Stats row */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10}}>
              <div style={{background:"var(--surface)",borderRadius:10,padding:"10px 14px"}}>
                <div style={{fontSize:11,color:"var(--muted)"}}>ยังขาดอีก</div>
                <div style={{fontFamily:"var(--font-mono)",fontWeight:700,color:isAchieved?"var(--positive)":"var(--warning)",marginTop:3}}>{isAchieved?"✓ บรรลุ!":"$"+fmt(remaining)}</div>
              </div>
              {g.deadline && <div style={{background:"var(--surface)",borderRadius:10,padding:"10px 14px"}}>
                <div style={{fontSize:11,color:"var(--muted)"}}>วันที่เป้าหมาย</div>
                <div style={{fontFamily:"var(--font-mono)",fontWeight:700,color:daysLeft<30&&daysLeft>0?"var(--negative)":daysLeft<=0?"var(--negative)":"var(--text)",marginTop:3}}>
                  {daysLeft <= 0 ? "หมดเวลาแล้ว" : `${daysLeft} วัน`}
                </div>
              </div>}
              {monthsToGoal && <div style={{background:"var(--surface)",borderRadius:10,padding:"10px 14px"}}>
                <div style={{fontSize:11,color:"var(--muted)"}}>ถึงเป้าหมายใน (DCA)</div>
                <div style={{fontFamily:"var(--font-mono)",fontWeight:700,color:"var(--accent2)",marginTop:3}}>~{monthsToGoal} เดือน</div>
              </div>}
              <div style={{background:"var(--surface)",borderRadius:10,padding:"10px 14px"}}>
                <div style={{fontSize:11,color:"var(--muted)"}}>เป้าหมาย (THB)</div>
                <div style={{fontFamily:"var(--font-mono)",fontWeight:700,fontSize:12,marginTop:3}}>฿{fmt(target*usdThb,0)}</div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
};

  }, [assets]);

  const handleUpdatePrices = useCallback(async () => {
    if (!assets.length) return;

    // Fetch USD/THB rate

    try {
      const prices = await fetchPrices(assets);
      const now = new Date().toISOString();
      setAssets(prev => prev.map(a => { const p=prices[a.ticker.toUpperCase()]; return p?{...a,currentPrice:p}:a; }));
      setLastUpdated(now);
      setPriceLog(prev => [...prev.slice(-19),{time:now,prices}]);
      setPriceStatus("done"); setTimeout(()=>setPriceStatus("idle"),3000);
    } catch(err) {
      setPriceError(err.message); setPriceStatus("error"); setTimeout(()=>setPriceStatus("idle"),5000);
    }
  }, [assets]);

  const saveAsset = (data) => {
    if (editAsset) setAssets(a=>a.map(x=>x.id===editAsset.id?{...data,id:editAsset.id}:x));
    else setAssets(a=>[...a,{...data,id:Date.now()}]);
    setShowModal(false); setEditAsset(null);
  };
  const saveGoal = (g) => {
    const updated = g.id ? goals.map(x => x.id===g.id?g:x) : [...goals, {...g, id:Date.now()}];
    setGoals(updated); localStorage.setItem('dca_goals', JSON.stringify(updated));
  };
  const deleteGoal = (id) => { const g = goals.filter(x=>x.id!==id); setGoals(g); localStorage.setItem('dca_goals', JSON.stringify(g)); };

  const deleteAsset = (id) => { const a=assets.find(x=>x.id===id); setConfirmDelete({id,name:a?.name||a?.ticker||"รายการนี้"}); };
  const confirmDoDelete = () => { if(confirmDelete) setAssets(a=>a.filter(x=>x.id!==confirmDelete.id)); setConfirmDelete(null); };

  const withPnl = useMemo(()=>assets.map(a=>({...a,...calcPnl(a)})),[assets]);
  const filtered = useMemo(()=>{
    let r = filterType==="ทั้งหมด"?withPnl:withPnl.filter(a=>a.type===filterType);

  },[withPnl,filterType,sortKey]);

    const tc=withPnl.reduce((s,a)=>s+a.cost,0),tv=withPnl.reduce((s,a)=>s+a.value,0),tp=tv-tc;

  },[withPnl]);
  const alloc = useMemo(()=>{ const g={}; withPnl.forEach(a=>{g[a.type]=(g[a.type]||0)+a.value;}); return Object.entries(g).map(([label,value])=>({label,value})); },[withPnl]);
  const topGainer = useMemo(()=>[...withPnl].sort((a,b)=>b.pnlPct-a.pnlPct)[0],[withPnl]);
  const topLoser = useMemo(()=>[...withPnl].sort((a,b)=>a.pnlPct-b.pnlPct)[0],[withPnl]);

  const exportCSV = () => {
    const rows = [["Date","Ticker","Name","Type","Qty","Avg Cost","Current Price","Currency","Cost Basis","Market Value","P&L","P&L%","Sector","Note"]];
    withPnl.forEach(a => {

    const allRows = [...rows, [""], ...lotRows];
    const csv = allRows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(",")).join("\n");
    const uri = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);

  };

      [data-theme="light"] tr:hover td{background:rgba(37,99,235,.04)}
      [data-theme="light"] .bar-track{background:#e2e8f0}
      [data-theme="light"] td{border-bottom-color:#e8edf5}
      [data-theme="light"] .stat-card::before{opacity:.7}
      .price-mobile{display:none} @media(max-width:900px){.dash-grid{grid-template-columns:1fr}}
      @media(max-width:600px){
        .header{padding:0 14px}.content{padding:14px}.highlights{grid-template-columns:1fr}
        .stats-grid{grid-template-columns:1fr 1fr}.stat-val{font-size:16px}
        .form-grid{grid-template-columns:1fr}
        th:nth-child(7),th:nth-child(8),td:nth-child(7),td:nth-child(8){display:none}
        th:nth-child(4),td:nth-child(4){display:none}
        .price-mobile{display:block;font-family:monospace;font-size:11px;color:#94a3b8;margin-top:2px}
      }
    `}</style>

    <div className="app">
      <header className="header">
        <div className="logo"><div className="logo-dot">📊</div>PortfolioTH</div>
        <div className="header-actions">
          <span className={`saved-badge ${saved?"show":""}`}><Icon d={Icons.check} size={12}/> บันทึกแล้ว</span>
          <div className="fx-badge" onClick={async()=>{try{const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=thb");const d=await r.json();if(d?.tether?.thb){setUsdThb(d.tether.thb);localStorage.setItem('usdThb',d.tether.thb);}}catch{}}} title="คลิกเพื่ออัพเดทอัตราแลกเปลี่ยน">
            <Icon d={Icons.currency} size={12}/> 1 USD = {usdThb.toFixed(2)} THB
          </div>
          <button className="icon-btn" onClick={()=>setDarkMode(d=>!d)} title={darkMode?"Light Mode":"Dark Mode"}>
            <Icon d={darkMode?Icons.sun:Icons.moon} size={16}/>
          </button>
          <button className="btn-ghost" onClick={exportCSV} title="Export CSV"><Icon d={Icons.export} size={15}/> CSV</button>
          <button className="btn-ghost" onClick={()=>setShowGoals(true)}><Icon d={Icons.target} size={15}/> เป้าหมาย</button>
          <button className="btn-ghost" onClick={()=>setShowTools(true)}><Icon d={Icons.calculator} size={15}/> คำนวณ</button>
          <button className="btn-ghost" onClick={()=>setShowLog(true)}><Icon d={Icons.clock} size={15}/></button>
          <button className="btn-ghost" onClick={()=>setShowDrive(true)}><Icon d={Icons.drive} size={15}/></button>
          <button className="btn-primary" onClick={()=>{setEditAsset(null);setShowModal(true);}}><Icon d={Icons.plus} size={15}/> เพิ่ม</button>
        </div>
      </header>

      <nav className="tabs">
        {[["dashboard",Icons.pie,"Dashboard"],["portfolio",Icons.chart,"พอร์ต"],["analysis",Icons.trending_up,"วิเคราะห์"],["tools",Icons.calculator,"เครื่องมือ"],["goals",Icons.target,"เป้าหมาย"]].map(([id,icon,label])=>(
          <button key={id} className={`tab ${tab===id?"active":""}`} onClick={()=>setTab(id)}><Icon d={icon} size={15}/>{label}</button>
        ))}
      </nav>

      <main className="content">
        <PricePanel assets={assets} onUpdatePrices={handleUpdatePrices} priceStatus={priceStatus} lastUpdated={lastUpdated} autoRefreshMin={autoRefreshMin} setAutoRefreshMin={setAutoRefreshMin}/>
        {priceError && priceStatus==="error" && <div className="error-banner">⚠️ ดึงราคาไม่สำเร็จ: {priceError}</div>}

        {tab==="dashboard" && <>
          <div className="stats-grid">
            <div className="stat-card"><div className="stat-label">มูลค่าพอร์ตรวม</div><div className="stat-val">{fmtCurrency(summary.totalValue)}</div><div className="stat-sub">≈ ฿{fmt(summary.totalValue*usdThb,0)} THB • {assets.length} สินทรัพย์</div></div>
            <div className="stat-card"><div className="stat-label">กำไร / ขาดทุนรวม</div><div className={`stat-val ${pnlColor(summary.totalPnl)}`}>{fmtCurrency(summary.totalPnl)}</div><div className={`stat-sub ${pnlColor(summary.totalPnlPct)}`}>{pct(summary.totalPnlPct)} จากต้นทุน</div></div>
            <div className="stat-card"><div className="stat-label">ต้นทุนรวม</div><div className="stat-val">{fmtCurrency(summary.totalCost)}</div><div className="stat-sub">Cost Basis</div></div>
            <div className="stat-card"><div className="stat-label">Win / Loss</div><div className="stat-val"><span className="positive">{summary.winners}</span> <span style={{color:"var(--border)"}}>|</span> <span className="negative">{summary.losers}</span></div><div className="stat-sub">กำไร | ขาดทุน</div></div>
          </div>
          <div className="highlights">
            {topGainer && <div className="highlight-card"><div className="hl-icon" style={{background:"rgba(74,222,128,.1)"}}>🏆</div><div className="hl-info"><h4>Best Performer</h4><div className="hl-name">{topGainer.name}</div><div className="hl-val positive">{pct(topGainer.pnlPct)}</div></div><div style={{marginLeft:"auto"}}><Sparkline positive={true}/></div></div>}
            {topLoser && <div className="highlight-card"><div className="hl-icon" style={{background:"rgba(248,113,113,.1)"}}>📉</div><div className="hl-info"><h4>Worst Performer</h4><div className="hl-name">{topLoser.name}</div><div className="hl-val negative">{pct(topLoser.pnlPct)}</div></div><div style={{marginLeft:"auto"}}><Sparkline positive={false}/></div></div>}
          </div>
          <GrowthChart assets={assets}/>
          <div className="dash-grid">
            <div className="card"><div className="card-title"><Icon d={Icons.chart} size={13}/> P&L by Asset</div><BarChart assets={assets}/></div>
            <div className="card"><div className="card-title"><Icon d={Icons.pie} size={13}/> Allocation</div>{alloc.length>0&&<DonutChart data={alloc}/>}</div>
          </div>
        </>}

        {tab==="portfolio" && <div className="card">
          <div className="toolbar">
            <div className="filter-chips">{["ทั้งหมด",...ASSET_TYPES].map(t=><button key={t} className={`chip ${filterType===t?"active":""}`} onClick={()=>setFilterType(t)}>{t}</button>)}</div>
            <select className="sort-sel ml-auto" value={sortKey} onChange={e=>setSortKey(e.target.value)}>
              <option value="value">Sort: มูลค่า</option><option value="pnlPct">Sort: %P&L</option><option value="pnlAmt">Sort: P&L</option><option value="name">Sort: ชื่อ</option>
            </select>
          </div>
          {filtered.length===0 ? <div className="empty-state"><h3>ยังไม่มีสินทรัพย์</h3><p>กด "+ เพิ่ม" เพื่อเริ่มต้น</p></div> :
          <div className="table-wrap"><table>
            <thead><tr><th>สินทรัพย์</th><th>ประเภท</th><th>จำนวน</th><th>ราคาปัจจุบัน</th><th>มูลค่า</th><th>P&L</th><th>%P&L</th><th>หมายเหตุ</th><th/></tr></thead>
            <tbody>{filtered.map(a=><tr key={a.id}>
              <td><div className="ticker-badge"><span className={`type-dot`} style={{background:a.type==="หุ้น"?"#60a5fa":a.type==="คริปโต"?"#f59e0b":a.type==="ETF"?"#34d399":a.type==="กองทุน"?"#f472b6":"#a78bfa"}}/><div><div style={{fontWeight:700,fontSize:13}}>{a.ticker}{a.dcaLots?.length>1&&<span className="dca-tag">DCA {a.dcaLots.length}x</span>}</div><div style={{fontSize:11,color:"var(--muted)"}}>{a.name}</div><div className="price-mobile">{fmt(a.currentPrice)} <span style={{fontSize:10}}>{a.currency}</span></div></div></div></td>
              <td><span style={{fontSize:12,color:"var(--muted)"}}>{a.type}</span></td>
              <td><span className="mono">{fmt(a.qty,a.qty%1===0?0:4)}</span></td>
              <td><span className="mono">{fmt(a.currentPrice)} <span style={{color:"var(--muted)",fontSize:10}}>{a.currency}</span></span></td>
              <td><span className="mono" style={{fontWeight:600}}>{fmt(a.value)}</span></td>
              <td><span className={`mono ${pnlColor(a.pnlAmt)}`}>{a.pnlAmt>=0?"+":""}{fmt(a.pnlAmt)}</span></td>
              <td><span className={`mono ${pnlColor(a.pnlPct)}`} style={{fontWeight:700}}>{pct(a.pnlPct)}</span></td>
              <td><span className="note-text" title={a.note}>{a.note||"—"}</span></td>
              <td><div className="actions">
                <button className="icon-btn" onClick={()=>{setEditAsset(a);setShowModal(true);}}><Icon d={Icons.edit} size={15}/></button>
                <button className="icon-btn danger" onClick={()=>deleteAsset(a.id)}><Icon d={Icons.trash} size={15}/></button>
              </div></td>
            </tr>)}</tbody>
          </table></div>}
        </div>}

        {tab==="analysis" && <>
          <div className="stats-grid">
            {ASSET_TYPES.map(type=>{
              const items=withPnl.filter(a=>a.type===type); if(!items.length) return null;
              const tv=items.reduce((s,a)=>s+a.value,0),tc=items.reduce((s,a)=>s+a.cost,0),tp=items.reduce((s,a)=>s+a.pnlAmt,0),pp=tc>0?(tp/tc)*100:0;
              return <div key={type} className="stat-card"><div className="stat-label">{type}</div><div className="stat-val">{fmt(tv)}</div><div className={`stat-sub ${pnlColor(pp)}`}>{pct(pp)} • {items.length} รายการ</div></div>;
            })}
          </div>
          <div className="card">
            <div className="card-title"><Icon d={Icons.trending_up} size={13}/> Sector Breakdown</div>
            <div className="table-wrap"><table>
              <thead><tr><th>Sector</th><th>สินทรัพย์</th><th>มูลค่ารวม</th><th>ต้นทุนรวม</th><th>P&L</th><th>%P&L</th></tr></thead>
              <tbody>{(()=>{
                const s={};
                withPnl.forEach(a=>{const k=a.sector||"Other";if(!s[k])s[k]=[];s[k].push(a);});
                return Object.entries(s).map(([sector,items])=>{
                  const v=items.reduce((s,a)=>s+a.value,0),c=items.reduce((s,a)=>s+a.cost,0),pa=v-c,pp=c>0?(pa/c)*100:0;
                  return <tr key={sector}><td style={{fontWeight:600}}>{sector}</td><td><span className="mono">{items.map(i=>i.ticker).join(", ")}</span></td><td><span className="mono">{fmt(v)}</span></td><td><span className="mono">{fmt(c)}</span></td><td><span className={`mono ${pnlColor(pa)}`}>{pa>=0?"+":""}{fmt(pa)}</span></td><td><span className={`mono ${pnlColor(pp)}`} style={{fontWeight:700}}>{pct(pp)}</span></td></tr>;
                });
              })()}</tbody>
            </table></div>
          </div>
        </>}

        {tab==="tools" && <ToolsTab assets={assets} usdThb={usdThb}/>}
        {tab==="goals" && <GoalsTab assets={assets} goals={goals} saveGoal={saveGoal} deleteGoal={deleteGoal} usdThb={usdThb}/>}
      </main>
    </div>

    {showModal && <Modal asset={editAsset} onSave={saveAsset} onClose={()=>{setShowModal(false);setEditAsset(null);}}/>}
    {showDrive && <DriveModal assets={assets} onClose={()=>setShowDrive(false)} onRestore={d=>{setAssets(d);setShowDrive(false);}}/>}
    {showLog && <PriceLogModal log={priceLog} onClose={()=>setShowLog(false)}/>}
    {confirmDelete && <div className="modal-overlay" onClick={()=>setConfirmDelete(null)}>
      <div className="confirm-dialog" onClick={e=>e.stopPropagation()}>
        <div className="confirm-icon">🗑️</div>
        <div className="confirm-title">ยืนยันการลบ</div>
        <div className="confirm-msg">ต้องการลบ <strong>{confirmDelete.name}</strong> ออกจากพอร์ตหรือไม่?</div>
        <div className="confirm-actions">
          <button className="btn-ghost" onClick={()=>setConfirmDelete(null)}>ยกเลิก</button>
          <button className="btn-delete" onClick={confirmDoDelete}><Icon d={Icons.trash} size={15}/> ลบ</button>
        </div>
      </div>
    </div>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
